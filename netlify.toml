[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# /itgc-series was removed; keep the URL alive for anything already linking to it.
[[redirects]]
  from = "/itgc-series"
  to = "/blog"
  status = 301

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404
