name: Scheduled Publish Rebuild

# Posts go live when a build runs on/after their pubDate, so this build is what
# actually publishes the scheduled queue. Netlify auto-builds on every push to
# master, so pushing an empty commit is enough — no build-hook secret.
#
# Runs DAILY: the queue publishes Mon/Wed/Fri, so a weekly Sunday build would
# leave mid-week posts sitting unpublished for days.

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-scheduled-posts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push an empty commit to trigger the Netlify deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: weekly rebuild to publish scheduled posts"
          git push
