<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Set Password — MarcoWeb</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #08111e;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      background: #152540;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      max-width: 380px;
      width: 100%;
      text-align: center;
    }
    .logo {
      width: 48px; height: 48px; border-radius: 50%;
      background: #1e3a5f; border: 2px solid #4a9edd;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.25rem; font-weight: 900; margin: 0 auto 1.25rem;
    }
    h1 { font-size: 1.35rem; font-weight: 700; margin-bottom: 0.4rem; }
    p { color: #9ca3af; font-size: 0.875rem; margin-bottom: 1.75rem; }
    input {
      display: block; width: 100%;
      padding: 0.75rem 1rem; margin-bottom: 0.75rem;
      border-radius: 10px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      color: white; font-size: 0.95rem; outline: none;
    }
    input:focus { border-color: #3b82f6; background: rgba(255,255,255,0.1); }
    button {
      width: 100%; padding: 0.75rem;
      background: #2563eb; color: white;
      font-weight: 600; border: none;
      border-radius: 10px; font-size: 1rem;
      cursor: pointer; margin-top: 0.25rem;
      transition: background 0.2s;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { opacity: 0.55; cursor: default; }
    .msg { margin-top: 1rem; font-size: 0.875rem; min-height: 1.25rem; }
    .error { color: #f87171; }
    .success { color: #34d399; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">M</div>
    <h1>Set your password</h1>
    <p>Choose a password for your MarcoWeb admin account.</p>
    <form id="form">
      <input type="password" id="pwd"  placeholder="New password (min 8 chars)" minlength="8" required />
      <input type="password" id="pwd2" placeholder="Confirm password" required />
      <button type="submit" id="btn">Set Password</button>
    </form>
    <div class="msg" id="msg"></div>
  </div>

  <script>
    var hash   = window.location.hash.replace(/^#/, '')
    var params = new URLSearchParams(hash)
    var recoveryToken = params.get('recovery_token')
    var inviteToken   = params.get('invite_token')
    var rawToken      = recoveryToken || inviteToken
    var tokenType     = recoveryToken ? 'recovery' : 'invite'

    if (!rawToken) {
      document.getElementById('msg').textContent = 'Invalid or expired link — request a new one.'
      document.getElementById('msg').className = 'msg error'
      document.getElementById('form').style.display = 'none'
    }

    document.getElementById('form').addEventListener('submit', async function (e) {
      e.preventDefault()
      var pwd  = document.getElementById('pwd').value
      var pwd2 = document.getElementById('pwd2').value
      var btn  = document.getElementById('btn')
      var msg  = document.getElementById('msg')

      if (pwd.length < 8) {
        msg.textContent = 'Password must be at least 8 characters.'
        msg.className = 'msg error'
        return
      }
      if (pwd !== pwd2) {
        msg.textContent = 'Passwords do not match.'
        msg.className = 'msg error'
        return
      }

      btn.disabled = true
      btn.textContent = 'Setting password…'
      msg.textContent = ''

      try {
        // Step 1: exchange raw token for a JWT access token
        var exchangeEndpoint = tokenType === 'recovery'
          ? '/.netlify/identity/recover'
          : '/.netlify/identity/invite'

        var exchangeRes = await fetch(exchangeEndpoint, {
          method: 'GET',
          headers: { 'Authorization': 'Bearer ' + rawToken },
        })

        if (!exchangeRes.ok) {
          var errData = {}
          try { errData = await exchangeRes.json() } catch (_) {}
          msg.textContent = errData.msg || 'Link expired — please request a new password reset.'
          msg.className = 'msg error'
          btn.disabled = false
          btn.textContent = 'Set Password'
          return
        }

        var tokenData = await exchangeRes.json()
        var accessToken = tokenData.access_token

        // Step 2: set the new password using the JWT
        var setRes = await fetch('/.netlify/identity/user', {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + accessToken,
          },
          body: JSON.stringify({ password: pwd }),
        })

        if (setRes.ok) {
          msg.textContent = 'Password set! Redirecting to admin…'
          msg.className = 'msg success'
          setTimeout(function () { window.location.href = '/admin/' }, 1800)
        } else {
          var setErr = {}
          try { setErr = await setRes.json() } catch (_) {}
          msg.textContent = setErr.msg || 'Failed to set password.'
          msg.className = 'msg error'
          btn.disabled = false
          btn.textContent = 'Set Password'
        }
      } catch (err) {
        msg.textContent = 'Network error — please try again.'
        msg.className = 'msg error'
        btn.disabled = false
        btn.textContent = 'Set Password'
      }
    })
  </script>
</body>
</html>
