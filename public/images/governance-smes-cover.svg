<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08111e"/>
      <stop offset="100%" style="stop-color:#0a1a30"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="#1e3a5f" stroke-width="1" opacity="0.3">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- Large shield - right side -->
  <path d="M820,100 L960,100 L980,130 L980,290 Q980,370 900,420 Q820,370 820,290 Z" fill="url(#shieldGrad)" stroke="#2563eb" stroke-width="2" opacity="0.9"/>
  <!-- Shield inner detail -->
  <path d="M840,125 L945,125 L960,148 L960,280 Q960,345 900,388 Q840,345 840,280 Z" fill="none" stroke="#4a9edd" stroke-width="1.5" opacity="0.5"/>
  <!-- Shield checkmark -->
  <polyline points="862,265 888,295 938,235" fill="none" stroke="#60a5fa" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small building icons -->
  <rect x="730" y="330" width="40" height="60" fill="#1e3a5f" stroke="#4a9edd" stroke-width="1.5" rx="2"/>
  <rect x="738" y="345" width="8" height="8" fill="#4a9edd" opacity="0.7"/>
  <rect x="752" y="345" width="8" height="8" fill="#4a9edd" opacity="0.7"/>
  <rect x="738" y="360" width="8" height="8" fill="#4a9edd" opacity="0.7"/>
  <rect x="752" y="360" width="8" height="8" fill="#4a9edd" opacity="0.7"/>
  <rect x="745" y="375" width="10" height="15" fill="#2563eb" opacity="0.8"/>
  <!-- Connecting lines building to shield -->
  <line x1="770" y1="355" x2="820" y2="300" stroke="#4a9edd" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <!-- SME nodes -->
  <circle cx="680" cy="200" r="18" fill="#0f2540" stroke="#3b82f6" stroke-width="2"/>
  <text x="680" y="205" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="bold">SME</text>
  <circle cx="720" cy="270" r="14" fill="#0f2540" stroke="#2563eb" stroke-width="1.5"/>
  <text x="720" y="274" text-anchor="middle" fill="#93c5fd" font-size="9">SME</text>
  <circle cx="670" cy="340" r="14" fill="#0f2540" stroke="#2563eb" stroke-width="1.5"/>
  <text x="670" y="344" text-anchor="middle" fill="#93c5fd" font-size="9">SME</text>
  <!-- Node connections -->
  <line x1="680" y1="218" x2="720" y2="256" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
  <line x1="720" y1="284" x2="680" y2="326" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
  <!-- NIST framework circles -->
  <circle cx="200" cy="200" r="55" fill="none" stroke="#1e4080" stroke-width="2" stroke-dasharray="8,4" opacity="0.6"/>
  <circle cx="200" cy="200" r="38" fill="#0a1830" stroke="#2563eb" stroke-width="1.5" opacity="0.8"/>
  <text x="200" y="195" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="bold">NIST</text>
  <text x="200" y="210" text-anchor="middle" fill="#60a5fa" font-size="10">CSF</text>
  <!-- Risk labels -->
  <rect x="90" y="290" width="110" height="28" rx="5" fill="#0f2540" stroke="#2563eb" stroke-width="1"/>
  <text x="145" y="308" text-anchor="middle" fill="#93c5fd" font-size="11">IDENTIFY</text>
  <rect x="90" y="328" width="110" height="28" rx="5" fill="#0f2540" stroke="#2563eb" stroke-width="1"/>
  <text x="145" y="346" text-anchor="middle" fill="#93c5fd" font-size="11">PROTECT</text>
  <rect x="90" y="366" width="110" height="28" rx="5" fill="#0f2540" stroke="#22c55e" stroke-width="1"/>
  <text x="145" y="384" text-anchor="middle" fill="#86efac" font-size="11">RECOVER</text>
  <!-- MarcoWeb watermark -->
  <text x="30" y="40" fill="#4a9edd" font-size="14" font-weight="700" font-family="system-ui, sans-serif" opacity="0.9">MarcoWeb.org</text>
  <!-- Category badge top-right -->
  <rect x="1050" y="22" width="130" height="28" rx="14" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="1115" y="41" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">CYBER SECURITY</text>
  <!-- Bottom title band -->
  <rect x="0" y="530" width="1200" height="100" fill="#050d1a" opacity="0.95"/>
  <rect x="0" y="528" width="1200" height="3" fill="#2563eb"/>
  <text x="50" y="578" fill="white" font-size="30" font-weight="800" font-family="system-ui, sans-serif">Governance: A Cybersecurity Lifeline</text>
  <text x="50" y="612" fill="#60a5fa" font-size="18" font-family="system-ui, sans-serif">For Small &amp; Medium Enterprises</text>
</svg>
