<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a1a20"/>
    </linearGradient>
    <linearGradient id="band" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="8" fill="url(#band)"/>
  <rect width="1200" height="8" y="622" fill="url(#band)"/>
  <text x="60" y="60" fill="#22d3ee" font-size="13" font-weight="600" letter-spacing="4">DIGITAL INCIDENT REPORT · TELECOMMUNICATIONS SECTOR</text>
  <line x1="60" y1="70" x2="1140" y2="70" stroke="#22d3ee" stroke-opacity="0.3" stroke-width="1"/>
  <text x="60" y="145" fill="#ffffff" font-size="56" font-weight="800" letter-spacing="-1">Optus</text>
  <text x="60" y="200" fill="#a5f3fc" font-size="24" font-weight="400">9.8 Million Customer Records · Unauthenticated API</text>
  <rect x="60" y="225" width="50" height="4" fill="#22d3ee" rx="2"/>
  <text x="60" y="280" fill="#cbd5e1" font-size="16" opacity="0.85">An unauthenticated API endpoint exposed the personal records</text>
  <text x="60" y="305" fill="#cbd5e1" font-size="16" opacity="0.85">of 9.8 million current and former Optus customers.</text>
  <rect x="60" y="345" width="200" height="100" fill="#052d36" rx="6"/>
  <text x="160" y="382" fill="#22d3ee" font-size="28" font-weight="800" text-anchor="middle">9.8M</text>
  <text x="160" y="405" fill="#a5f3fc" font-size="12" text-anchor="middle">RECORDS EXPOSED</text>
  <rect x="280" y="345" width="200" height="100" fill="#052d36" rx="6"/>
  <text x="380" y="385" fill="#22d3ee" font-size="24" font-weight="800" text-anchor="middle">Sep 2022</text>
  <text x="380" y="408" fill="#a5f3fc" font-size="12" text-anchor="middle">BREACH DATE</text>
  <rect x="500" y="345" width="200" height="100" fill="#052d36" rx="6"/>
  <text x="600" y="382" fill="#ef4444" font-size="18" font-weight="800" text-anchor="middle">Open API</text>
  <text x="600" y="402" fill="#fca5a5" font-size="11" text-anchor="middle">NO AUTH · SEQUENTIAL IDs</text>
  <rect x="800" y="95" width="340" height="430" fill="#111827" rx="8"/>
  <text x="970" y="130" fill="#22d3ee" font-size="11" text-anchor="middle" letter-spacing="3">ITGC CONTROLS IMPLICATED</text>
  <line x1="820" y1="140" x2="1120" y2="140" stroke="#22d3ee" stroke-opacity="0.2" stroke-width="1"/>
  <text x="820" y="170" fill="#e2e8f0" font-size="13">API Authentication and Authorisation</text>
  <text x="820" y="192" fill="#e2e8f0" font-size="13">Security Architecture Review</text>
  <text x="820" y="214" fill="#e2e8f0" font-size="13">Penetration Testing Coverage</text>
  <text x="820" y="236" fill="#e2e8f0" font-size="13">Data Minimisation and Retention</text>
  <text x="820" y="258" fill="#e2e8f0" font-size="13">Third-Party API Security Assessment</text>
  <line x1="820" y1="275" x2="1120" y2="275" stroke="#22d3ee" stroke-opacity="0.2" stroke-width="1"/>
  <text x="970" y="305" fill="#22d3ee" font-size="11" text-anchor="middle" letter-spacing="3">SECTOR CONTEXT</text>
  <text x="820" y="335" fill="#94a3b8" font-size="12">Telcos hold identity documents for KYC</text>
  <text x="820" y="355" fill="#94a3b8" font-size="12">verification. Exposure of passport and</text>
  <text x="820" y="375" fill="#94a3b8" font-size="12">licence numbers enables identity fraud</text>
  <text x="820" y="395" fill="#94a3b8" font-size="12">well beyond the initial breach period.</text>
  <text x="970" y="480" fill="#22d3ee" font-size="11" text-anchor="middle" letter-spacing="2">marcoweb.org</text>
</svg>
