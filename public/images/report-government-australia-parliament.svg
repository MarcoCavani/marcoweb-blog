  <text x="820" y="375" fill="#94a3b8" font-size="12">intelligence, policy information, and</text>
  <text x="820" y="395" fill="#94a3b8" font-size="12">pre-election political intelligence.</text>
  <text x="970" y="480" fill="#818cf8" font-size="11" text-anchor="middle" letter-spacing="2">marcoweb.org</text>
