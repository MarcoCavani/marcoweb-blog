<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="band" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="8" fill="url(#band)"/>
  <rect width="1200" height="8" y="622" fill="url(#band)"/>
  <text x="60" y="60" fill="#818cf8" font-size="13" font-weight="600" letter-spacing="4">DIGITAL INCIDENT REPORT · GOVERNMENT SECTOR</text>
  <line x1="60" y1="70" x2="1140" y2="70" stroke="#818cf8" stroke-opacity="0.3" stroke-width="1"/>
  <text x="60" y="145" fill="#ffffff" font-size="38" font-weight="800" letter-spacing="-1">Australian Parliament House</text>
  <text x="60" y="200" fill="#c7d2fe" font-size="24" font-weight="400">State-Sponsored Network Breach · 2019</text>
  <rect x="60" y="225" width="50" height="4" fill="#6366f1" rx="2"/>
  <text x="60" y="280" fill="#cbd5e1" font-size="16" opacity="0.85">Foreign state actors breached the Parliament House network</text>
  <text x="60" y="305" fill="#cbd5e1" font-size="16" opacity="0.85">weeks before the 2019 Australian federal election.</text>
  <rect x="60" y="345" width="200" height="100" fill="#1e1b4b" rx="6"/>
  <text x="160" y="382" fill="#818cf8" font-size="22" font-weight="800" text-anchor="middle">State Actor</text>
  <text x="160" y="405" fill="#c7d2fe" font-size="11" text-anchor="middle">ATTRIBUTED THREAT</text>
  <rect x="280" y="345" width="200" height="100" fill="#1e1b4b" rx="6"/>
  <text x="380" y="385" fill="#818cf8" font-size="24" font-weight="800" text-anchor="middle">Feb 2019</text>
  <text x="380" y="408" fill="#c7d2fe" font-size="12" text-anchor="middle">DISCLOSED</text>
  <rect x="500" y="345" width="200" height="100" fill="#1e1b4b" rx="6"/>
  <text x="600" y="382" fill="#ef4444" font-size="20" font-weight="800" text-anchor="middle">Pre-Election</text>
  <text x="600" y="405" fill="#fca5a5" font-size="11" text-anchor="middle">TIMING: 3 WEEKS BEFORE VOTE</text>
  <rect x="800" y="95" width="340" height="430" fill="#111827" rx="8"/>
  <text x="970" y="130" fill="#818cf8" font-size="11" text-anchor="middle" letter-spacing="3">ITGC CONTROLS IMPLICATED</text>
  <line x1="820" y1="140" x2="1120" y2="140" stroke="#818cf8" stroke-opacity="0.2" stroke-width="1"/>
  <text x="820" y="170" fill="#e2e8f0" font-size="13">Network Intrusion Detection</text>
  <text x="820" y="192" fill="#e2e8f0" font-size="13">Multi-Factor Authentication</text>
  <text x="820" y="214" fill="#e2e8f0" font-size="13">Privileged Access Monitoring</text>
  <text x="820" y="236" fill="#e2e8f0" font-size="13">Security Incident Response</text>
  <text x="820" y="258" fill="#e2e8f0" font-size="13">Threat Intelligence Integration</text>
  <line x1="820" y1="275" x2="1120" y2="275" stroke="#818cf8" stroke-opacity="0.2" stroke-width="1"/>
  <text x="970" y="305" fill="#818cf8" font-size="11" text-anchor="middle" letter-spacing="3">SECTOR CONTEXT</text>
  <text x="820" y="335" fill="#94a3b8" font-size="12">Government networks are persistent</text>
