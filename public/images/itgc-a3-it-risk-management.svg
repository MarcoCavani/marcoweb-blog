  <rect x="220" y="195" width="80" height="80" fill="#ef4444" fill-opacity="0.35" stroke="#ef4444" stroke-opacity="0.6" stroke-width="1"/>
  <rect x="60" y="275" width="80" height="80" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="140" y="275" width="80" height="80" fill="#22c55e" fill-opacity="0.25" stroke="#22c55e" stroke-opacity="0.5" stroke-width="1"/>
  <rect x="220" y="275" width="80" height="80" fill="#eab308" fill-opacity="0.25" stroke="#eab308" stroke-opacity="0.5" stroke-width="1"/>
  <rect x="60" y="355" width="80" height="80" fill="#22c55e" fill-opacity="0.1" stroke="#22c55e" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="140" y="355" width="80" height="80" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="220" y="355" width="80" height="80" fill="#22c55e" fill-opacity="0.25" stroke="#22c55e" stroke-opacity="0.5" stroke-width="1"/>
