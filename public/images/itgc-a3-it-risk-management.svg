  <text x="180" y="480" fill="#6b7280" font-size="10" text-anchor="middle">MED</text>
  <text x="260" y="480" fill="#6b7280" font-size="10" text-anchor="middle">HIGH</text>
  <text x="310" y="180" fill="#60a5fa" font-size="13" font-weight="600" letter-spacing="4" opacity="0.9">GROUP A · CONTROL A.3</text>
  <text x="310" y="265" fill="#ffffff" font-size="52" font-weight="800" letter-spacing="-1">IT Risk Management</text>
  <text x="310" y="320" fill="#93c5fd" font-size="22" font-weight="400" opacity="0.85">Risk Registers, Owners, Treatment Plans and Reporting</text>
