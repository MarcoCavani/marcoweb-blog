<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0505"/>
      <stop offset="100%" stop-color="#3d0f0f"/>
    </linearGradient>
    <linearGradient id="band" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="8" fill="url(#band)"/>
  <rect width="1200" height="8" y="622" fill="url(#band)"/>
  <text x="60" y="60" fill="#ef4444" font-size="13" font-weight="600" letter-spacing="4">CRITICAL INFRASTRUCTURE REPORT · POWER GRID</text>
  <line x1="60" y1="70" x2="1140" y2="70" stroke="#ef4444" stroke-opacity="0.3" stroke-width="1"/>
  <text x="60" y="145" fill="#ffffff" font-size="40" font-weight="800" letter-spacing="-1">Ukraine Power Grid</text>
  <text x="60" y="200" fill="#fecaca" font-size="24" font-weight="400">First Confirmed Cyberattack to Cut Electricity · Dec 2015</text>
  <rect x="60" y="225" width="50" height="4" fill="#ef4444" rx="2"/>
  <text x="60" y="280" fill="#cbd5e1" font-size="16" opacity="0.85">Sandworm used BlackEnergy malware and remote access to open</text>
  <text x="60" y="305" fill="#cbd5e1" font-size="16" opacity="0.85">breakers at three Ukrainian power distribution companies.</text>
  <rect x="60" y="345" width="200" height="100" fill="#450a0a" rx="6"/>
  <text x="160" y="382" fill="#ef4444" font-size="24" font-weight="800" text-anchor="middle">225,000</text>
  <text x="160" y="405" fill="#fecaca" font-size="12" text-anchor="middle">CUSTOMERS BLACKED OUT</text>
  <rect x="280" y="345" width="200" height="100" fill="#450a0a" rx="6"/>
  <text x="380" y="382" fill="#ef4444" font-size="22" font-weight="800" text-anchor="middle">6 Hours</text>
  <text x="380" y="405" fill="#fecaca" font-size="11" text-anchor="middle">POWER OUTAGE DURATION</text>
  <rect x="500" y="345" width="200" height="100" fill="#450a0a" rx="6"/>
  <text x="600" y="382" fill="#ef4444" font-size="18" font-weight="800" text-anchor="middle">SCADA</text>
  <text x="600" y="402" fill="#fecaca" font-size="11" text-anchor="middle">ICS/OT SYSTEMS COMPROMISED</text>
  <rect x="800" y="95" width="340" height="430" fill="#1c0a0a" rx="8"/>
  <text x="970" y="130" fill="#ef4444" font-size="11" text-anchor="middle" letter-spacing="3">CRITICAL CONTROLS FAILED</text>
  <line x1="820" y1="140" x2="1120" y2="140" stroke="#ef4444" stroke-opacity="0.2" stroke-width="1"/>
  <text x="820" y="170" fill="#e2e8f0" font-size="13">IT/OT Network Segmentation</text>
  <text x="820" y="192" fill="#e2e8f0" font-size="13">Remote Access Security (VPN/MFA)</text>
  <text x="820" y="214" fill="#e2e8f0" font-size="13">SCADA/ICS Authentication</text>
  <text x="820" y="236" fill="#e2e8f0" font-size="13">Spear-Phishing Detection</text>
  <text x="820" y="258" fill="#e2e8f0" font-size="13">Manual Override Capability</text>
  <line x1="820" y1="275" x2="1120" y2="275" stroke="#ef4444" stroke-opacity="0.2" stroke-width="1"/>
  <text x="970" y="305" fill="#ef4444" font-size="11" text-anchor="middle" letter-spacing="3">INFRASTRUCTURE CONTEXT</text>
  <text x="820" y="335" fill="#fca5a5" font-size="12">Attackers also launched a telephone</text>
  <text x="820" y="355" fill="#fca5a5" font-size="12">denial-of-service attack on support</text>
  <text x="820" y="375" fill="#fca5a5" font-size="12">lines to delay reporting, and wiped</text>
  <text x="820" y="395" fill="#fca5a5" font-size="12">firmware from serial-to-Ethernet devices.</text>
  <text x="970" y="480" fill="#ef4444" font-size="11" text-anchor="middle" letter-spacing="2">marcoweb.org</text>
</svg>
