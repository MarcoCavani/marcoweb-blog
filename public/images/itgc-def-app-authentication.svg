  <circle cx="130" cy="307" r="3" fill="#6366f1" opacity="0.7"/>
  <circle cx="148" cy="307" r="3" fill="#6366f1" opacity="0.7"/>
  <circle cx="166" cy="307" r="3" fill="#6366f1" opacity="0.7"/>
  <circle cx="184" cy="307" r="3" fill="#6366f1" opacity="0.7"/>
