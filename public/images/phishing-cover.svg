<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08111e"/>
      <stop offset="100%" style="stop-color:#0e1a2e"/>
    </linearGradient>
    <radialGradient id="hookGlow" cx="35%" cy="50%" r="35%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#08111e;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#hookGlow)"/>
  <!-- Grid -->
  <g stroke="#1e3a5f" stroke-width="1" opacity="0.2">
    <line x1="0" y1="90" x2="1200" y2="90"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="150" y1="0" x2="150" y2="530"/><line x1="300" y1="0" x2="300" y2="530"/>
    <line x1="450" y1="0" x2="450" y2="530"/><line x1="600" y1="0" x2="600" y2="530"/>
    <line x1="750" y1="0" x2="750" y2="530"/><line x1="900" y1="0" x2="900" y2="530"/>
    <line x1="1050" y1="0" x2="1050" y2="530"/>
  </g>
  <!-- Fishing line from top -->
  <line x1="260" y1="0" x2="260" y2="180" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,4"/>
  <!-- Hook shape -->
  <path d="M260,180 Q260,250 310,250 Q360,250 360,200 Q360,175 340,165" fill="none" stroke="#f59e0b" stroke-width="5" stroke-linecap="round"/>
  <circle cx="340" cy="162" r="6" fill="#f59e0b"/>
  <!-- Hook tip barb -->
  <line x1="310" y1="250" x2="295" y2="235" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
  <!-- Dangling email envelope on hook -->
  <rect x="220" y="285" width="100" height="70" rx="6" fill="#1e3a5f" stroke="#f59e0b" stroke-width="2"/>
  <polyline points="220,285 270,320 320,285" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <text x="270" y="342" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">URGENT!</text>
  <text x="270" y="358" text-anchor="middle" fill="#fbbf24" font-size="9">Click here now</text>
  <!-- Thread connecting to hook -->
  <line x1="270" y1="285" x2="310" y2="255" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,3"/>
  <!-- Attack vector stats - right panel -->
  <rect x="440" y="65" width="720" height="450" rx="8" fill="#050d1a" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="800" y="100" text-anchor="middle" fill="#f59e0b" font-size="15" font-weight="700" font-family="system-ui">2024 Phishing Threat Landscape</text>
  <!-- Big stat -->
  <rect x="470" y="115" width="660" height="80" rx="6" fill="#0f1a2a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="800" y="150" text-anchor="middle" fill="#fbbf24" font-size="36" font-weight="900" font-family="system-ui">1,897,952</text>
  <text x="800" y="178" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="system-ui">Phishing attacks detected · May 2023 – April 2024</text>
  <!-- Three key stats row -->
  <rect x="470" y="210" width="200" height="80" rx="6" fill="#0f1a2a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="570" y="242" text-anchor="middle" fill="#ef4444" font-size="28" font-weight="900">90%</text>
  <text x="570" y="262" text-anchor="middle" fill="#fca5a5" font-size="10">of cyberattacks</text>
  <text x="570" y="276" text-anchor="middle" fill="#fca5a5" font-size="10">start with phishing</text>
  <rect x="690" y="210" width="200" height="80" rx="6" fill="#0f1a2a" stroke="#f97316" stroke-width="1.5"/>
  <text x="790" y="240" text-anchor="middle" fill="#f97316" font-size="22" font-weight="900">$4.5M</text>
  <text x="790" y="258" text-anchor="middle" fill="#fdba74" font-size="10">avg. breach cost</text>
  <text x="790" y="272" text-anchor="middle" fill="#fdba74" font-size="10">from phishing</text>
  <rect x="910" y="210" width="200" height="80" rx="6" fill="#0f1a2a" stroke="#a855f7" stroke-width="1.5"/>
  <text x="1010" y="240" text-anchor="middle" fill="#d8b4fe" font-size="22" font-weight="900">$3B</text>
  <text x="1010" y="258" text-anchor="middle" fill="#c4b5fd" font-size="10">BEC losses</text>
  <text x="1010" y="272" text-anchor="middle" fill="#c4b5fd" font-size="10">Business Email Compromise</text>
  <!-- Attack types breakdown -->
  <text x="470" y="320" fill="#60a5fa" font-size="11" font-weight="700" font-family="system-ui">TOP PHISHING VECTORS:</text>
  <g font-size="10" font-family="system-ui">
    <!-- Bar 1 -->
    <text x="470" y="342" fill="#94a3b8">Spear Phishing</text>
    <rect x="470" y="348" width="400" height="14" rx="3" fill="#1e3a5f"/>
    <rect x="470" y="348" width="360" height="14" rx="3" fill="#f59e0b" opacity="0.8"/>
    <text x="840" y="360" fill="#fbbf24" font-size="10">86%</text>
    <!-- Bar 2 -->
    <text x="470" y="382" fill="#94a3b8">Credential Harvesting</text>
    <rect x="470" y="388" width="400" height="14" rx="3" fill="#1e3a5f"/>
    <rect x="470" y="388" width="340" height="14" rx="3" fill="#ef4444" opacity="0.8"/>
    <text x="820" y="400" fill="#fca5a5" font-size="10">72%</text>
    <!-- Bar 3 -->
    <text x="470" y="422" fill="#94a3b8">Vishing (Voice)</text>
    <rect x="470" y="428" width="400" height="14" rx="3" fill="#1e3a5f"/>
    <rect x="470" y="428" width="250" height="14" rx="3" fill="#f97316" opacity="0.8"/>
    <text x="730" y="440" fill="#fdba74" font-size="10">58%</text>
    <!-- Bar 4 -->
    <text x="470" y="462" fill="#94a3b8">Smishing (SMS)</text>
    <rect x="470" y="468" width="400" height="14" rx="3" fill="#1e3a5f"/>
    <rect x="470" y="468" width="180" height="14" rx="3" fill="#a855f7" opacity="0.8"/>
    <text x="660" y="480" fill="#d8b4fe" font-size="10">44%</text>
  </g>
  <!-- Seniors stat bottom left -->
  <rect x="40" y="390" width="380" height="70" rx="6" fill="#0f1a2a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="230" y="415" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="700">$3.4 BILLION</text>
  <text x="230" y="435" text-anchor="middle" fill="#fca5a5" font-size="11">lost by Americans 60+ in 2023</text>
  <text x="230" y="452" text-anchor="middle" fill="#94a3b8" font-size="10">FBI Elder Fraud Report</text>
  <!-- MarcoWeb watermark -->
  <text x="30" y="38" fill="#f59e0b" font-size="14" font-weight="700" font-family="system-ui, sans-serif" opacity="0.9">MarcoWeb.org</text>
  <!-- Category badge -->
  <rect x="1040" y="18" width="140" height="28" rx="14" fill="#1a1000" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="1110" y="37" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">CYBER SECURITY</text>
  <!-- Bottom band -->
  <rect x="0" y="530" width="1200" height="100" fill="#050a05" opacity="0.97"/>
  <rect x="0" y="528" width="1200" height="3" fill="#f59e0b"/>
  <text x="50" y="576" fill="white" font-size="28" font-weight="800" font-family="system-ui, sans-serif">Phishing Threats in 2024</text>
  <text x="50" y="612" fill="#fbbf24" font-size="17" font-family="system-ui, sans-serif">1.9M Attacks · BEC Fraud · Credential Harvesting</text>
</svg>
