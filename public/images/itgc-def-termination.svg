<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#1a2f6e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <!-- Timeline showing employee leave vs app access revocation -->
  <line x1="90" y1="310" x2="360" y2="310" stroke="#6366f1" stroke-width="2" stroke-opacity="0.6"/>
  <!-- Events on timeline -->
  <circle cx="120" cy="310" r="8" fill="#22c55e"/>
  <text x="120" y="290" fill="#6ee7b7" font-size="9" text-anchor="middle">EMPLOYED</text>
  <circle cx="200" cy="310" r="8" fill="#ef4444"/>
  <text x="200" y="290" fill="#fca5a5" font-size="9" text-anchor="middle">TERMINATED</text>
  <circle cx="330" cy="310" r="8" fill="#f59e0b"/>
  <text x="330" y="290" fill="#fbbf24" font-size="9" text-anchor="middle">APP ACCESS?</text>
  <!-- Alert box -->
  <rect x="90" y="330" width="270" height="70" fill="#ef4444" fill-opacity="0.1" stroke="#ef4444" stroke-width="1.5" rx="4" stroke-opacity="0.7"/>
  <text x="225" y="355" fill="#fca5a5" font-size="11" text-anchor="middle" font-weight="600">ACCESS STILL ACTIVE</text>
  <text x="225" y="372" fill="#fca5a5" font-size="10" text-anchor="middle">SAP · Oracle · Workday · ADP</text>
  <text x="225" y="390" fill="#fca5a5" font-size="10" text-anchor="middle">130 days post-termination</text>
  <text x="310" y="180" fill="#818cf8" font-size="13" font-weight="600" letter-spacing="4" opacity="0.9">GROUPS D / E / F · APPLICATION CONTROLS</text>
  <text x="310" y="265" fill="#ffffff" font-size="52" font-weight="800" letter-spacing="-1">App Termination</text>
  <text x="310" y="320" fill="#c7d2fe" font-size="20" font-weight="400" opacity="0.85">Revoking Application Access on Employee Departure</text>
  <rect x="310" y="352" width="60" height="4" fill="url(#accent)" rx="2"/>
  <text x="310" y="403" fill="#818cf8" font-size="15" font-weight="500" letter-spacing="2" opacity="0.8">IT GENERAL CONTROLS · IT AUDIT</text>
  <text x="310" y="500" fill="#ffffff" font-size="16" opacity="0.5" letter-spacing="1">marcoweb.org</text>
</svg>
