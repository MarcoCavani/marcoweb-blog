<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0a1e"/>
      <stop offset="100%" stop-color="#2d1b5e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <!-- MFA shield with layers -->
  <path d="M185 210 L265 235 L265 310 Q265 360 185 380 Q105 360 105 310 L105 235 Z" fill="none" stroke="#8b5cf6" stroke-width="2.5"/>
  <!-- Layer 1: password dots -->
  <circle cx="145" cy="270" r="5" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="165" cy="270" r="5" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="185" cy="270" r="5" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="205" cy="270" r="5" fill="#8b5cf6" opacity="0.8"/>
  <!-- Layer 2: MFA code -->
  <rect x="145" y="290" width="80" height="22" fill="#8b5cf6" fill-opacity="0.2" rx="4"/>
  <text x="185" y="305" fill="#c4b5fd" font-size="12" text-anchor="middle" font-weight="600">6-DIGIT OTP</text>
  <!-- Layer 3: hardware key -->
  <rect x="155" y="322" width="60" height="20" fill="#8b5cf6" fill-opacity="0.3" rx="10"/>
  <circle cx="185" cy="332" r="6" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="185" y="358" fill="#c4b5fd" font-size="10" text-anchor="middle">FIDO2 KEY</text>
  <text x="310" y="180" fill="#a78bfa" font-size="13" font-weight="600" letter-spacing="4" opacity="0.9">GROUP C · CONTROL C.1</text>
  <text x="310" y="265" fill="#ffffff" font-size="58" font-weight="800" letter-spacing="-1">Authentication</text>
  <text x="310" y="320" fill="#c4b5fd" font-size="22" font-weight="400" opacity="0.85">MFA, Password Policy and Phishing-Resistant Auth</text>
  <rect x="310" y="355" width="60" height="4" fill="url(#accent)" rx="2"/>
  <text x="310" y="410" fill="#a78bfa" font-size="15" font-weight="500" letter-spacing="2" opacity="0.8">IT GENERAL CONTROLS · IT AUDIT</text>
  <text x="310" y="500" fill="#ffffff" font-size="16" opacity="0.5" letter-spacing="1">marcoweb.org</text>
</svg>
