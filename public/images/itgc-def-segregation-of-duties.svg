<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#1a2f6e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <!-- SoD conflict diagram: two hands, two roles, one conflict -->
  <circle cx="140" cy="260" r="40" fill="none" stroke="#6366f1" stroke-width="2"/>
  <text x="140" y="254" fill="#818cf8" font-size="10" text-anchor="middle">CREATE</text>
  <text x="140" y="268" fill="#818cf8" font-size="10" text-anchor="middle">INVOICE</text>
  <circle cx="250" cy="260" r="40" fill="none" stroke="#6366f1" stroke-width="2"/>
  <text x="250" y="254" fill="#818cf8" font-size="10" text-anchor="middle">APPROVE</text>
  <text x="250" y="268" fill="#818cf8" font-size="10" text-anchor="middle">INVOICE</text>
  <!-- Overlap zone -->
  <ellipse cx="195" cy="260" rx="18" ry="32" fill="#ef4444" fill-opacity="0.25" stroke="#ef4444" stroke-width="1.5"/>
  <text x="195" y="265" fill="#fca5a5" font-size="11" text-anchor="middle" font-weight="700">!</text>
  <!-- One user holding both -->
  <circle cx="195" cy="330" r="22" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <text x="195" y="326" fill="#fbbf24" font-size="12" text-anchor="middle">USER</text>
  <text x="195" y="340" fill="#fbbf24" font-size="10" text-anchor="middle">A. JONES</text>
  <line x1="155" y1="298" x2="180" y2="310" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.7"/>
  <line x1="235" y1="298" x2="210" y2="310" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.7"/>
  <text x="195" y="385" fill="#fca5a5" font-size="10" text-anchor="middle">SOD CONFLICT: FRAUD RISK</text>
  <text x="310" y="180" fill="#818cf8" font-size="13" font-weight="600" letter-spacing="4" opacity="0.9">GROUPS D / E / F · APPLICATION CONTROLS</text>
  <text x="310" y="265" fill="#ffffff" font-size="46" font-weight="800" letter-spacing="-1">Segregation of Duties</text>
  <text x="310" y="320" fill="#c7d2fe" font-size="20" font-weight="400" opacity="0.85">SoD Conflicts in Finance, Payroll and ERP Systems</text>
  <rect x="310" y="352" width="60" height="4" fill="url(#accent)" rx="2"/>
  <text x="310" y="403" fill="#818cf8" font-size="15" font-weight="500" letter-spacing="2" opacity="0.8">IT GENERAL CONTROLS · IT AUDIT</text>
  <text x="310" y="500" fill="#ffffff" font-size="16" opacity="0.5" letter-spacing="1">marcoweb.org</text>
</svg>
