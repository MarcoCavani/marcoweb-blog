<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0f00"/>
      <stop offset="100%" stop-color="#5c3200"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <!-- Data migration reconciliation panel -->
  <rect x="80" y="215" width="280" height="190" fill="none" stroke="#f59e0b" stroke-width="1.5" rx="6" stroke-opacity="0.6"/>
  <text x="220" y="235" fill="#fbbf24" font-size="11" text-anchor="middle">DATA MIGRATION RECONCILIATION</text>
  <line x1="80" y1="245" x2="360" y2="245" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
  <!-- Before/after comparison -->
  <text x="140" y="263" fill="#fde68a" font-size="9" text-anchor="middle">SOURCE SYSTEM</text>
  <text x="290" y="263" fill="#fde68a" font-size="9" text-anchor="middle">TARGET ERP</text>
  <line x1="80" y1="268" x2="360" y2="268" stroke="#f59e0b" stroke-opacity="0.2" stroke-width="1"/>
  <text x="95" y="283" fill="#a3a3a3" font-size="9">Orders</text>
  <text x="185" y="283" fill="#86efac" font-size="9">458,231</text>
  <text x="240" y="283" fill="#fca5a5" font-size="9">457,109</text>
  <text x="320" y="283" fill="#ef4444" font-size="9">DIFF!</text>
  <text x="95" y="299" fill="#a3a3a3" font-size="9">Customers</text>
  <text x="185" y="299" fill="#86efac" font-size="9">82,401</text>
  <text x="240" y="299" fill="#fca5a5" font-size="9">82,401</text>
  <text x="320" y="299" fill="#86efac" font-size="9">OK</text>
  <text x="95" y="315" fill="#a3a3a3" font-size="9">Inv. value</text>
  <text x="185" y="315" fill="#86efac" font-size="9">$4.82M</text>
  <text x="240" y="315" fill="#fca5a5" font-size="9">$3.91M</text>
  <text x="320" y="315" fill="#ef4444" font-size="9">DIFF!</text>
  <text x="95" y="331" fill="#a3a3a3" font-size="9">Open PO</text>
  <text x="185" y="331" fill="#86efac" font-size="9">12,884</text>
  <text x="240" y="331" fill="#fca5a5" font-size="9">12,884</text>
  <text x="320" y="331" fill="#86efac" font-size="9">OK</text>
  <!-- Status -->
  <rect x="95" y="348" width="240" height="24" fill="#ef4444" fill-opacity="0.15" rx="3"/>
  <text x="215" y="363" fill="#fca5a5" font-size="10" text-anchor="middle" font-weight="600">GO-LIVE FAILED · DATA RECONCILIATION ERROR</text>
  <text x="310" y="180" fill="#fbbf24" font-size="13" font-weight="600" letter-spacing="4" opacity="0.9">GROUP G · CHANGE MANAGEMENT CONTROLS</text>
  <text x="310" y="265" fill="#ffffff" font-size="46" font-weight="800" letter-spacing="-1">Data Conversion</text>
  <text x="310" y="320" fill="#fde68a" font-size="20" font-weight="400" opacity="0.85">Migration Reconciliation, Validation and Rollback</text>
  <rect x="310" y="352" width="60" height="4" fill="url(#accent)" rx="2"/>
  <text x="310" y="403" fill="#fbbf24" font-size="15" font-weight="500" letter-spacing="2" opacity="0.8">IT GENERAL CONTROLS · IT AUDIT</text>
  <text x="310" y="500" fill="#ffffff" font-size="16" opacity="0.5" letter-spacing="1">marcoweb.org</text>
