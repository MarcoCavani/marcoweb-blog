  <text x="215" y="369" fill="#fca5a5" font-size="8" text-anchor="middle">185M POUNDS COMPENSATION BILL</text>
  <text x="310" y="180" fill="#4ade80" font-size="13" font-weight="600" letter-spacing="4" opacity="0.9">GROUP H · OPERATIONAL RESILIENCE CONTROLS</text>
  <text x="310" y="265" fill="#ffffff" font-size="43" font-weight="800" letter-spacing="-1">Disaster Recovery</text>
  <text x="310" y="320" fill="#bbf7d0" font-size="20" font-weight="400" opacity="0.85">Recovery Plans, RTO/RPO Testing and Business Continuity</text>
  <rect x="310" y="352" width="60" height="4" fill="url(#accent)" rx="2"/>
  <text x="310" y="403" fill="#4ade80" font-size="15" font-weight="500" letter-spacing="2" opacity="0.8">IT GENERAL CONTROLS · IT AUDIT</text>
  <text x="310" y="500" fill="#ffffff" font-size="16" opacity="0.5" letter-spacing="1">marcoweb.org</text>
