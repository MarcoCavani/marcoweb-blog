<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08111e"/>
      <stop offset="100%" style="stop-color:#130820"/>
    </linearGradient>
    <linearGradient id="realSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f2540;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a3a5c;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="fakeSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a0830;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2d0f50;stop-opacity:1"/>
    </linearGradient>
    <clipPath id="leftHalf">
      <rect x="0" y="0" width="600" height="630"/>
    </clipPath>
    <clipPath id="rightHalf">
      <rect x="600" y="0" width="600" height="630"/>
    </clipPath>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Left side - REAL -->
  <rect x="0" y="0" width="600" height="630" fill="url(#realSide)" opacity="0.9"/>
  <!-- Right side - FAKE -->
  <rect x="600" y="0" width="600" height="630" fill="url(#fakeSide)" opacity="0.9"/>
  <!-- Center dividing line -->
  <line x1="600" y1="0" x2="600" y2="630" stroke="#8b5cf6" stroke-width="3"/>
  <line x1="597" y1="0" x2="597" y2="630" stroke="#4a9edd" stroke-width="1" opacity="0.4"/>
  <line x1="603" y1="0" x2="603" y2="630" stroke="#ef4444" stroke-width="1" opacity="0.4"/>
  <!-- Left - REAL face silhouette (simple geometric) -->
  <ellipse cx="300" cy="250" rx="90" ry="110" fill="#1a3a5c" stroke="#4a9edd" stroke-width="2"/>
  <!-- Face features left -->
  <ellipse cx="270" cy="230" rx="14" ry="10" fill="#0f2540" stroke="#4a9edd" stroke-width="1.5"/>
  <ellipse cx="330" cy="230" rx="14" ry="10" fill="#0f2540" stroke="#4a9edd" stroke-width="1.5"/>
  <ellipse cx="271" cy="229" rx="5" ry="5" fill="#60a5fa"/>
  <ellipse cx="331" cy="229" rx="5" ry="5" fill="#60a5fa"/>
  <path d="M270,275 Q300,290 330,275" fill="none" stroke="#4a9edd" stroke-width="2" stroke-linecap="round"/>
  <!-- REAL label -->
  <rect x="230" y="390" width="140" height="36" rx="18" fill="#0f2540" stroke="#22c55e" stroke-width="2"/>
  <text x="300" y="413" text-anchor="middle" fill="#22c55e" font-size="14" font-weight="700" font-family="system-ui">✓ GENUINE</text>
  <!-- Left grid lines (normal) -->
  <g stroke="#1e4080" stroke-width="0.5" opacity="0.4">
    <line x1="100" y1="0" x2="100" y2="530"/>
    <line x1="200" y1="0" x2="200" y2="530"/>
    <line x1="400" y1="0" x2="400" y2="530"/>
    <line x1="500" y1="0" x2="500" y2="530"/>
    <line x1="0" y1="100" x2="600" y2="100"/>
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="400" x2="600" y2="400"/>
  </g>
  <!-- Right - DEEPFAKE face (glitching) -->
  <ellipse cx="900" cy="250" rx="90" ry="110" fill="#2d0f50" stroke="#a855f7" stroke-width="2"/>
  <!-- Glitch slices -->
  <rect x="820" y="200" width="180" height="12" fill="#1a0830" opacity="0.6"/>
  <rect x="835" y="240" width="130" height="8" fill="#1a0830" opacity="0.5"/>
  <rect x="825" y="280" width="160" height="6" fill="#1a0830" opacity="0.4"/>
  <!-- Face features right - slightly off -->
  <ellipse cx="870" cy="228" rx="14" ry="10" fill="#1a0830" stroke="#a855f7" stroke-width="1.5"/>
  <ellipse cx="932" cy="232" rx="14" ry="10" fill="#1a0830" stroke="#a855f7" stroke-width="1.5"/>
  <!-- Glitch eyes -->
  <ellipse cx="871" cy="228" rx="5" ry="5" fill="#ef4444" opacity="0.8"/>
  <ellipse cx="933" cy="232" rx="5" ry="5" fill="#ef4444" opacity="0.8"/>
  <!-- Mouth slightly crooked -->
  <path d="M870,272 Q902,292 935,270" fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round"/>
  <!-- FAKE label -->
  <rect x="830" y="390" width="140" height="36" rx="18" fill="#1a0830" stroke="#ef4444" stroke-width="2"/>
  <text x="900" y="413" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="700" font-family="system-ui">⚠ DEEPFAKE</text>
  <!-- Right GAN neural network lines -->
  <g stroke="#7c3aed" stroke-width="0.5" opacity="0.3">
    <line x1="700" y1="0" x2="700" y2="530"/>
    <line x1="800" y1="0" x2="800" y2="530"/>
    <line x1="1000" y1="0" x2="1000" y2="530"/>
    <line x1="1100" y1="0" x2="1100" y2="530"/>
    <line x1="600" y1="100" x2="1200" y2="100"/>
    <line x1="600" y1="200" x2="1200" y2="200"/>
    <line x1="600" y1="400" x2="1200" y2="400"/>
  </g>
  <!-- GAN nodes right -->
  <circle cx="680" cy="150" r="6" fill="#7c3aed" opacity="0.6"/>
  <circle cx="720" cy="180" r="4" fill="#a855f7" opacity="0.5"/>
  <circle cx="760" cy="140" r="5" fill="#7c3aed" opacity="0.6"/>
  <line x1="680" y1="150" x2="720" y2="180" stroke="#7c3aed" stroke-width="1" opacity="0.4"/>
  <line x1="720" y1="180" x2="760" y2="140" stroke="#7c3aed" stroke-width="1" opacity="0.4"/>
  <!-- GAN label -->
  <text x="900" y="455" text-anchor="middle" fill="#a855f7" font-size="12" font-family="monospace">GAN · Generator vs Discriminator</text>
  <!-- REAL label top left -->
  <text x="300" y="95" text-anchor="middle" fill="#60a5fa" font-size="18" font-weight="700" font-family="system-ui">REAL</text>
  <!-- FAKE label top right -->
  <text x="900" y="95" text-anchor="middle" fill="#c084fc" font-size="18" font-weight="700" font-family="system-ui">AI GENERATED</text>
  <!-- $35M incident -->
  <rect x="630" y="150" width="240" height="60" rx="6" fill="#1a0830" stroke="#ef4444" stroke-width="1.5" opacity="0.9"/>
  <text x="750" y="172" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="700" font-family="system-ui">Voice Clone Attack</text>
  <text x="750" y="190" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="900" font-family="system-ui">$35 MILLION</text>
  <text x="750" y="205" text-anchor="middle" fill="#fca5a5" font-size="9" font-family="system-ui">transferred to criminals (2020)</text>
  <!-- MarcoWeb watermark -->
  <text x="30" y="38" fill="#a855f7" font-size="14" font-weight="700" font-family="system-ui, sans-serif" opacity="0.9">MarcoWeb.org</text>
  <!-- Category badge -->
  <rect x="1040" y="18" width="140" height="28" rx="14" fill="#2d0f50" stroke="#a855f7" stroke-width="1.5"/>
  <text x="1110" y="37" text-anchor="middle" fill="#d8b4fe" font-size="12" font-weight="600">CYBER SECURITY</text>
  <!-- Bottom band -->
  <rect x="0" y="530" width="1200" height="100" fill="#060210" opacity="0.97"/>
  <rect x="0" y="528" width="600" height="3" fill="#3b82f6"/>
  <rect x="600" y="528" width="600" height="3" fill="#a855f7"/>
  <text x="50" y="576" fill="white" font-size="29" font-weight="800" font-family="system-ui, sans-serif">Deepfake Awareness</text>
  <text x="50" y="612" fill="#c084fc" font-size="17" font-family="system-ui, sans-serif">The AI Threat You Can't Always See · GAN Technology</text>
</svg>
