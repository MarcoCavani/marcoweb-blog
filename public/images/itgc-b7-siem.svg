  <text x="320" y="248" fill="#6b7280" font-size="9" text-anchor="end">AUTH</text>
  <rect x="90" y="258" width="220" height="12" fill="#14b8a6" fill-opacity="0.1" rx="2"/>
  <rect x="90" y="258" width="200" height="12" fill="#eab308" fill-opacity="0.4" rx="2"/>
  <text x="320" y="268" fill="#6b7280" font-size="9" text-anchor="end">NETWORK</text>
  <rect x="90" y="278" width="220" height="12" fill="#14b8a6" fill-opacity="0.1" rx="2"/>
  <rect x="90" y="278" width="220" height="12" fill="#ef4444" fill-opacity="0.5" rx="2"/>
  <text x="320" y="288" fill="#fca5a5" font-size="9" font-weight="700" text-anchor="end">CRITICAL</text>
  <!-- correlation lines -->
  <line x1="90" y1="310" x2="310" y2="310" stroke="#14b8a6" stroke-opacity="0.2" stroke-width="1"/>
  <circle cx="120" cy="320" r="4" fill="#ef4444" opacity="0.8"/>
  <circle cx="160" cy="318" r="3" fill="#eab308" opacity="0.7"/>
  <circle cx="200" cy="325" r="5" fill="#ef4444" opacity="0.9"/>
  <circle cx="250" cy="316" r="3" fill="#eab308" opacity="0.7"/>
  <circle cx="290" cy="322" r="4" fill="#ef4444" opacity="0.8"/>
  <polyline points="120,320 160,318 200,325 250,316 290,322" fill="none" stroke="#14b8a6" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="90" y="380" fill="#2dd4bf" font-size="10" opacity="0.7">OPEN CASES: 3 CRITICAL  |  12 HIGH</text>
  <text x="90" y="400" fill="#2dd4bf" font-size="10" opacity="0.5">MEAN TIME TO DETECT: 4.2 hrs</text>
  <text x="310" y="180" fill="#2dd4bf" font-size="13" font-weight="600" letter-spacing="4" opacity="0.9">GROUP B · CONTROL B.7</text>
  <text x="310" y="265" fill="#ffffff" font-size="68" font-weight="800" letter-spacing="-1">SIEM</text>
  <text x="310" y="320" fill="#99f6e4" font-size="22" font-weight="400" opacity="0.85">Correlation, Alerting and Incident Detection</text>
  <rect x="310" y="355" width="60" height="4" fill="url(#accent)" rx="2"/>
  <text x="310" y="410" fill="#2dd4bf" font-size="15" font-weight="500" letter-spacing="2" opacity="0.8">IT GENERAL CONTROLS · IT AUDIT</text>
  <text x="310" y="500" fill="#ffffff" font-size="16" opacity="0.5" letter-spacing="1">marcoweb.org</text>
