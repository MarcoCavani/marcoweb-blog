  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <!-- SIEM dashboard UI -->
  <rect x="70" y="200" width="270" height="220" fill="none" stroke="#14b8a6" stroke-width="1.5" rx="6" stroke-opacity="0.6"/>
  <rect x="70" y="200" width="270" height="22" fill="#14b8a6" fill-opacity="0.15" rx="6"/>
  <text x="90" y="215" fill="#2dd4bf" font-size="10">SIEM · Security Event Dashboard</text>
  <!-- Alert bars -->
  <rect x="90" y="238" width="220" height="12" fill="#14b8a6" fill-opacity="0.1" rx="2"/>
