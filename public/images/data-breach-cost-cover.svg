<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08111e"/>
      <stop offset="100%" style="stop-color:#0a1520"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#08111e;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Grid -->
  <g stroke="#1e3a5f" stroke-width="1" opacity="0.2">
    <line x1="0" y1="90" x2="1200" y2="90"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="530"/><line x1="400" y1="0" x2="400" y2="530"/>
    <line x1="600" y1="0" x2="600" y2="530"/><line x1="800" y1="0" x2="800" y2="530"/>
    <line x1="1000" y1="0" x2="1000" y2="530"/>
  </g>
  <!-- Report header -->
  <rect x="40" y="65" width="480" height="55" rx="6" fill="#0a1a2a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="280" y="90" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">IBM Security / Ponemon Institute Report 2024</text>
  <text x="280" y="110" text-anchor="middle" fill="#64748b" font-size="10">604 organisations surveyed · 3,556 security leaders</text>
  <!-- Headline cost box -->
  <rect x="40" y="135" width="480" height="90" rx="8" fill="#0a1520" stroke="#10b981" stroke-width="2"/>
  <text x="280" y="168" text-anchor="middle" fill="#6ee7b7" font-size="14" font-weight="700">Global Average Cost of a Data Breach</text>
  <text x="280" y="208" text-anchor="middle" fill="#10b981" font-size="46" font-weight="900" font-family="system-ui">$4.88M</text>
  <!-- Industry breakdown bar chart -->
  <text x="40" y="255" fill="#60a5fa" font-size="11" font-weight="700" font-family="system-ui">COST BY INDUSTRY (USD MILLIONS):</text>
  <!-- Healthcare bar - tallest -->
  <g font-family="system-ui" font-size="10">
    <rect x="48" y="275" width="68" height="160" rx="3" fill="#ef4444" opacity="0.85"/>
    <text x="82" y="270" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="700">$10.10M</text>
    <text x="82" y="450" text-anchor="middle" fill="#94a3b8" font-size="9">Health-</text>
    <text x="82" y="462" text-anchor="middle" fill="#94a3b8" font-size="9">care</text>
    <!-- Financial -->
    <rect x="132" y="315" width="68" height="120" rx="3" fill="#f97316" opacity="0.85"/>
    <text x="166" y="310" text-anchor="middle" fill="#f97316" font-size="10" font-weight="700">$6.08M</text>
    <text x="166" y="450" text-anchor="middle" fill="#94a3b8" font-size="9">Finance</text>
    <!-- Pharma -->
    <rect x="216" y="325" width="68" height="110" rx="3" fill="#f59e0b" opacity="0.85"/>
    <text x="250" y="320" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="700">$5.56M</text>
    <text x="250" y="450" text-anchor="middle" fill="#94a3b8" font-size="9">Pharma</text>
    <!-- Energy -->
    <rect x="300" y="338" width="68" height="97" rx="3" fill="#eab308" opacity="0.85"/>
    <text x="334" y="333" text-anchor="middle" fill="#eab308" font-size="10" font-weight="700">$4.72M</text>
    <text x="334" y="450" text-anchor="middle" fill="#94a3b8" font-size="9">Energy</text>
    <!-- Technology -->
    <rect x="384" y="350" width="68" height="85" rx="3" fill="#3b82f6" opacity="0.85"/>
    <text x="418" y="345" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="700">$4.66M</text>
    <text x="418" y="450" text-anchor="middle" fill="#94a3b8" font-size="9">Tech</text>
  </g>
  <!-- 12th year label -->
  <rect x="40" y="476" width="480" height="36" rx="4" fill="#1a0808" stroke="#ef4444" stroke-width="1"/>
  <text x="280" y="499" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700">Healthcare leads for 12th consecutive year</text>
  <!-- Right panel - cost factors -->
  <rect x="560" y="65" width="600" height="460" rx="8" fill="#050d1a" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="860" y="100" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="700" font-family="system-ui">COST REDUCTION FACTORS</text>
  <rect x="575" y="108" width="570" height="3" rx="1" fill="#10b981" opacity="0.4"/>
  <!-- Factor rows -->
  <g font-family="system-ui" font-size="10">
    <!-- AI & Automation -->
    <rect x="575" y="118" width="570" height="42" rx="4" fill="#0a1a10" stroke="#10b981" stroke-width="1" opacity="0.9"/>
    <text x="590" y="136" fill="#6ee7b7" font-size="11" font-weight="700">AI Security Platform</text>
    <text x="590" y="152" fill="#94a3b8">Automated threat detection and response pipeline</text>
    <text x="1110" y="145" text-anchor="end" fill="#10b981" font-size="16" font-weight="900">−$1.76M</text>
    <!-- DevSecOps -->
    <rect x="575" y="168" width="570" height="42" rx="4" fill="#0a1a10" stroke="#10b981" stroke-width="1" opacity="0.7"/>
    <text x="590" y="186" fill="#6ee7b7" font-size="11" font-weight="700">DevSecOps Integration</text>
    <text x="590" y="202" fill="#94a3b8">Security embedded into development lifecycle</text>
    <text x="1110" y="195" text-anchor="end" fill="#10b981" font-size="14" font-weight="700">−$1.14M</text>
    <!-- IR Team -->
    <rect x="575" y="218" width="570" height="42" rx="4" fill="#0a1a10" stroke="#10b981" stroke-width="1" opacity="0.6"/>
    <text x="590" y="236" fill="#6ee7b7" font-size="11" font-weight="700">IR Team &amp; Plan</text>
    <text x="590" y="252" fill="#94a3b8">Dedicated incident response with tested plan</text>
    <text x="1110" y="245" text-anchor="end" fill="#10b981" font-size="13" font-weight="700">−$944K</text>
    <!-- Encryption -->
    <rect x="575" y="268" width="570" height="42" rx="4" fill="#0a1a10" stroke="#10b981" stroke-width="1" opacity="0.5"/>
    <text x="590" y="286" fill="#6ee7b7" font-size="11" font-weight="700">Data Encryption</text>
    <text x="590" y="302" fill="#94a3b8">Encryption at rest and in transit</text>
    <text x="1110" y="295" text-anchor="end" fill="#10b981" font-size="13">−$252K</text>
    <!-- Training -->
    <rect x="575" y="318" width="570" height="42" rx="4" fill="#0a1a10" stroke="#10b981" stroke-width="1" opacity="0.4"/>
    <text x="590" y="336" fill="#6ee7b7" font-size="11" font-weight="700">Employee Training</text>
    <text x="590" y="352" fill="#94a3b8">Security awareness programs</text>
    <text x="1110" y="345" text-anchor="end" fill="#10b981" font-size="13">−$248K</text>
  </g>
  <!-- Cost increasing factors -->
  <rect x="575" y="368" width="570" height="3" rx="1" fill="#ef4444" opacity="0.4"/>
  <text x="860" y="390" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700" font-family="system-ui">COST INCREASING FACTORS</text>
  <g font-family="system-ui" font-size="10">
    <rect x="575" y="398" width="570" height="36" rx="4" fill="#1a0808" stroke="#ef4444" stroke-width="1" opacity="0.8"/>
    <text x="590" y="416" fill="#fca5a5" font-size="11">System Complexity</text>
    <text x="590" y="430" fill="#94a3b8">Legacy systems and security complexity</text>
    <text x="1110" y="422" text-anchor="end" fill="#ef4444" font-size="13">+$291K</text>
    <rect x="575" y="440" width="570" height="36" rx="4" fill="#1a0808" stroke="#ef4444" stroke-width="1" opacity="0.6"/>
    <text x="590" y="458" fill="#fca5a5" font-size="11">Cloud Migration (incomplete)</text>
    <text x="590" y="472" fill="#94a3b8">Increased attack surface during migration</text>
    <text x="1110" y="462" text-anchor="end" fill="#ef4444" font-size="13">+$284K</text>
  </g>
  <!-- MarcoWeb watermark -->
  <text x="30" y="38" fill="#10b981" font-size="14" font-weight="700" font-family="system-ui, sans-serif" opacity="0.9">MarcoWeb.org</text>
  <!-- Category badge -->
  <rect x="1040" y="18" width="140" height="28" rx="14" fill="#0a1a10" stroke="#10b981" stroke-width="1.5"/>
  <text x="1110" y="37" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="600">CYBER SECURITY</text>
  <!-- Bottom band -->
  <rect x="0" y="530" width="1200" height="100" fill="#030a08" opacity="0.97"/>
  <rect x="0" y="528" width="1200" height="3" fill="#10b981"/>
  <text x="50" y="576" fill="white" font-size="28" font-weight="800" font-family="system-ui, sans-serif">The Cost of Data Breaches 2024</text>
  <text x="50" y="612" fill="#6ee7b7" font-size="17" font-family="system-ui, sans-serif">IBM/Ponemon Report · $4.88M Average · 604 Orgs Surveyed</text>
</svg>
