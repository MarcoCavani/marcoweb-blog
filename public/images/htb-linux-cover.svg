<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050f05"/>
      <stop offset="100%" style="stop-color:#06120a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle scanlines -->
  <g opacity="0.03" fill="#22c55e">
    <rect x="0" y="0" width="1200" height="1"/><rect x="0" y="4" width="1200" height="1"/>
    <rect x="0" y="8" width="1200" height="1"/><rect x="0" y="12" width="1200" height="1"/>
    <rect x="0" y="16" width="1200" height="1"/><rect x="0" y="20" width="1200" height="1"/>
    <rect x="0" y="24" width="1200" height="1"/><rect x="0" y="28" width="1200" height="1"/>
  </g>
  <!-- Main terminal window -->
  <rect x="60" y="55" width="750" height="460" rx="10" fill="#010c01" stroke="#166534" stroke-width="2"/>
  <rect x="60" y="55" width="750" height="36" rx="10" fill="#14532d"/>
  <rect x="60" y="79" width="750" height="12" fill="#14532d"/>
  <circle cx="86" cy="73" r="7" fill="#ef4444" opacity="0.85"/>
  <circle cx="110" cy="73" r="7" fill="#eab308" opacity="0.85"/>
  <circle cx="134" cy="73" r="7" fill="#22c55e" opacity="0.85"/>
  <text x="435" y="79" text-anchor="middle" fill="#86efac" font-size="13" font-family="monospace">HTB Linux Fundamentals</text>
  <!-- Terminal content -->
  <text x="85" y="118" fill="#22c55e" font-size="12" font-family="monospace">htb-student@TARGET:~$</text>
  <text x="85" y="145" fill="#6b7280" font-size="11" font-family="monospace"># System Information Commands</text>
  <text x="85" y="170" fill="#22c55e" font-size="12" font-family="monospace">htb-student@TARGET:~$ <tspan fill="white">whoami</tspan></text>
  <text x="85" y="192" fill="#86efac" font-size="12" font-family="monospace">htb-student</text>
  <text x="85" y="216" fill="#22c55e" font-size="12" font-family="monospace">htb-student@TARGET:~$ <tspan fill="white">uname -a</tspan></text>
  <text x="85" y="238" fill="#86efac" font-size="12" font-family="monospace">Linux TARGET 4.15.0-20-generic #21-Ubuntu</text>
  <text x="85" y="260" fill="#86efac" font-size="12" font-family="monospace">x86_64 x86_64 x86_64 GNU/Linux</text>
  <text x="85" y="285" fill="#22c55e" font-size="12" font-family="monospace">htb-student@TARGET:~$ <tspan fill="white">id</tspan></text>
  <text x="85" y="307" fill="#86efac" font-size="12" font-family="monospace">uid=1000(htb-student) gid=1000(htb-student)</text>
  <text x="85" y="329" fill="#86efac" font-size="12" font-family="monospace">groups=1000(htb-student),4(adm),27(sudo)</text>
  <text x="85" y="354" fill="#22c55e" font-size="12" font-family="monospace">htb-student@TARGET:~$ <tspan fill="white">ip a</tspan></text>
  <text x="85" y="376" fill="#86efac" font-size="12" font-family="monospace">2: ens192: &lt;BROADCAST,MULTICAST,UP&gt;</text>
  <text x="85" y="397" fill="#86efac" font-size="12" font-family="monospace">    link/ether 00:50:56:b9:de:ad</text>
  <text x="85" y="418" fill="#86efac" font-size="12" font-family="monospace">    inet 10.129.x.x/16 brd 10.129.255.255</text>
  <text x="85" y="442" fill="#22c55e" font-size="12" font-family="monospace">htb-student@TARGET:~$ <tspan fill="white">pwd</tspan></text>
  <text x="85" y="464" fill="#86efac" font-size="12" font-family="monospace">/home/htb-student</text>
  <text x="85" y="488" fill="#22c55e" font-size="12" font-family="monospace">htb-student@TARGET:~$ <tspan fill="#fbbf24">_</tspan></text>
  <!-- Right panel - HTB info -->
  <rect x="840" y="55" width="320" height="460" rx="10" fill="#010c01" stroke="#166534" stroke-width="1.5"/>
  <!-- HTB logo area -->
  <rect x="855" y="75" width="285" height="80" rx="6" fill="#0a1f0a" stroke="#16a34a" stroke-width="1"/>
  <text x="997" y="108" text-anchor="middle" fill="#4ade80" font-size="22" font-weight="900" font-family="monospace">HTB</text>
  <text x="997" y="130" text-anchor="middle" fill="#86efac" font-size="12" font-family="monospace">HackTheBox Academy</text>
  <text x="997" y="148" text-anchor="middle" fill="#22c55e" font-size="10" font-family="monospace">Linux Fundamentals</text>
  <!-- Module list -->
  <text x="860" y="185" fill="#4ade80" font-size="11" font-weight="700" font-family="monospace">MODULES COVERED:</text>
  <g font-size="10" font-family="monospace" fill="#86efac">
    <text x="860" y="205">▸ System Information</text>
    <text x="860" y="223">▸ Navigation</text>
    <text x="860" y="241">▸ Files &amp; Directories</text>
    <text x="860" y="259">▸ Permissions</text>
    <text x="860" y="277">▸ User Management</text>
    <text x="860" y="295">▸ Package Management</text>
    <text x="860" y="313">▸ Service Management</text>
    <text x="860" y="331">▸ Network Services</text>
  </g>
  <!-- Commands list -->
  <rect x="855" y="350" width="285" height="150" rx="6" fill="#050f05" stroke="#166534" stroke-width="1"/>
  <text x="870" y="373" fill="#4ade80" font-size="10" font-weight="700" font-family="monospace">KEY COMMANDS:</text>
  <g font-size="10" font-family="monospace">
    <text x="870" y="392" fill="#fbbf24">whoami</text><text x="940" y="392" fill="#94a3b8"> • </text><text x="955" y="392" fill="#fbbf24">id</text><text x="975" y="392" fill="#94a3b8"> • </text><text x="988" y="392" fill="#fbbf24">hostname</text>
    <text x="870" y="410" fill="#fbbf24">uname -a</text><text x="950" y="410" fill="#94a3b8"> • </text><text x="965" y="410" fill="#fbbf24">ip a</text>
    <text x="870" y="428" fill="#fbbf24">netstat</text><text x="930" y="428" fill="#94a3b8"> • </text><text x="945" y="428" fill="#fbbf24">ss</text><text x="965" y="428" fill="#94a3b8"> • </text><text x="978" y="428" fill="#fbbf24">ps aux</text>
    <text x="870" y="446" fill="#fbbf24">env</text><text x="898" y="446" fill="#94a3b8"> • </text><text x="910" y="446" fill="#fbbf24">lsblk</text><text x="950" y="446" fill="#94a3b8"> • </text><text x="963" y="446" fill="#fbbf24">lspci</text>
    <text x="870" y="464" fill="#fbbf24">lsof</text><text x="905" y="464" fill="#94a3b8"> • </text><text x="918" y="464" fill="#fbbf24">lsusb</text><text x="960" y="464" fill="#94a3b8"> • </text><text x="973" y="464" fill="#fbbf24">who</text>
  </g>
  <!-- MarcoWeb watermark -->
  <text x="30" y="38" fill="#22c55e" font-size="14" font-weight="700" font-family="system-ui, sans-serif" opacity="0.9">MarcoWeb.org</text>
  <!-- Category badge -->
  <rect x="1055" y="18" width="125" height="28" rx="14" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="1117" y="37" text-anchor="middle" fill="#86efac" font-size="12" font-weight="600">TUTORIAL</text>
  <!-- Bottom band -->
  <rect x="0" y="530" width="1200" height="100" fill="#020a02" opacity="0.97"/>
  <rect x="0" y="528" width="1200" height="3" fill="#22c55e"/>
  <text x="50" y="576" fill="white" font-size="28" font-weight="800" font-family="system-ui, sans-serif">HTB Linux Fundamentals</text>
  <text x="50" y="612" fill="#86efac" font-size="18" font-family="system-ui, sans-serif">HackTheBox Academy · Hands-on Lab Walkthrough</text>
</svg>
