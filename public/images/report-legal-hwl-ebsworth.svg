  <text x="600" y="402" fill="#fca5a5" font-size="11" text-anchor="middle">AGENCIES AS DOWNSTREAM VICTIMS</text>
  <rect x="800" y="95" width="340" height="430" fill="#111827" rx="8"/>
  <text x="970" y="130" fill="#94a3b8" font-size="11" text-anchor="middle" letter-spacing="3">ITGC CONTROLS IMPLICATED</text>
  <line x1="820" y1="140" x2="1120" y2="140" stroke="#94a3b8" stroke-opacity="0.2" stroke-width="1"/>
  <text x="820" y="170" fill="#e2e8f0" font-size="13">Ransomware Detection and Response</text>
  <text x="820" y="192" fill="#e2e8f0" font-size="13">Data Exfiltration Prevention (DLP)</text>
  <text x="820" y="236" fill="#e2e8f0" font-size="13">Incident Response and Notification</text>
  <text x="820" y="258" fill="#e2e8f0" font-size="13">Client Data Segregation Controls</text>
  <line x1="820" y1="275" x2="1120" y2="275" stroke="#94a3b8" stroke-opacity="0.2" stroke-width="1"/>
  <text x="970" y="305" fill="#94a3b8" font-size="11" text-anchor="middle" letter-spacing="3">SECTOR CONTEXT</text>
  <text x="820" y="335" fill="#94a3b8" font-size="12">Law firms hold privileged client data</text>
  <text x="820" y="355" fill="#94a3b8" font-size="12">including litigation strategy, contracts,</text>
  <text x="820" y="375" fill="#94a3b8" font-size="12">and government policy documents</text>
  <text x="820" y="395" fill="#94a3b8" font-size="12">that cannot be unexfiltrated.</text>
  <text x="970" y="480" fill="#94a3b8" font-size="11" text-anchor="middle" letter-spacing="2">marcoweb.org</text>
