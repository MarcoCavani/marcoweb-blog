<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="band" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="8" fill="url(#band)"/>
  <rect width="1200" height="8" y="622" fill="url(#band)"/>
  <text x="60" y="60" fill="#94a3b8" font-size="13" font-weight="600" letter-spacing="4">DIGITAL INCIDENT REPORT · LEGAL SECTOR</text>
  <line x1="60" y1="70" x2="1140" y2="70" stroke="#94a3b8" stroke-opacity="0.3" stroke-width="1"/>
  <text x="60" y="145" fill="#ffffff" font-size="44" font-weight="800" letter-spacing="-1">HWL Ebsworth</text>
  <text x="60" y="200" fill="#cbd5e1" font-size="24" font-weight="400">4TB of Client Data · ALPHV BlackCat Ransomware</text>
  <rect x="60" y="225" width="50" height="4" fill="#94a3b8" rx="2"/>
  <text x="60" y="280" fill="#cbd5e1" font-size="16" opacity="0.85">ALPHV/BlackCat exfiltrated 4TB from one of Australia's largest</text>
