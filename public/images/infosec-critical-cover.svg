<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08111e"/>
      <stop offset="100%" style="stop-color:#0e1a2e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="35%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#08111e;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Grid -->
  <g stroke="#1e3a5f" stroke-width="1" opacity="0.25">
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>
  <!-- CIA Triad triangle - center right -->
  <polygon points="900,90 1100,420 700,420" fill="none" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
  <polygon points="900,115 1080,400 720,400" fill="none" stroke="#0284c7" stroke-width="1" opacity="0.3"/>
  <!-- CIA nodes -->
  <!-- Confidentiality - top -->
  <circle cx="900" cy="90" r="48" fill="#0c2340" stroke="#0ea5e9" stroke-width="2.5"/>
  <text x="900" y="84" text-anchor="middle" fill="#38bdf8" font-size="11" font-weight="700" font-family="system-ui">CONF-</text>
  <text x="900" y="98" text-anchor="middle" fill="#38bdf8" font-size="11" font-weight="700" font-family="system-ui">IDENT-</text>
  <text x="900" y="112" text-anchor="middle" fill="#38bdf8" font-size="11" font-weight="700" font-family="system-ui">IALITY</text>
  <!-- Integrity - bottom right -->
  <circle cx="1100" cy="420" r="48" fill="#0c2340" stroke="#10b981" stroke-width="2.5"/>
  <text x="1100" y="414" text-anchor="middle" fill="#34d399" font-size="11" font-weight="700" font-family="system-ui">INTEG-</text>
  <text x="1100" y="428" text-anchor="middle" fill="#34d399" font-size="11" font-weight="700" font-family="system-ui">RITY</text>
  <!-- Availability - bottom left -->
  <circle cx="700" cy="420" r="48" fill="#0c2340" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="700" y="414" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700" font-family="system-ui">AVAIL-</text>
  <text x="700" y="428" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700" font-family="system-ui">ABILITY</text>
  <!-- CIA label center -->
  <text x="900" y="265" text-anchor="middle" fill="#0ea5e9" font-size="28" font-weight="900" font-family="system-ui" opacity="0.5">CIA</text>
  <!-- Power grid icon left -->
  <rect x="60" y="80" width="480" height="340" rx="6" fill="#050d1a" stroke="#1e3a5f" stroke-width="1.5" opacity="0.8"/>
  <text x="300" y="110" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600" font-family="system-ui">CRITICAL INFRASTRUCTURE</text>
  <!-- Power tower -->
  <line x1="200" y1="300" x2="200" y2="160" stroke="#4a9edd" stroke-width="3"/>
  <line x1="160" y1="200" x2="240" y2="200" stroke="#4a9edd" stroke-width="3"/>
  <line x1="170" y1="230" x2="230" y2="230" stroke="#4a9edd" stroke-width="2"/>
  <line x1="200" y1="160" x2="160" y2="200" stroke="#4a9edd" stroke-width="2"/>
  <line x1="200" y1="160" x2="240" y2="200" stroke="#4a9edd" stroke-width="2"/>
  <!-- Power lines -->
  <path d="M160,200 Q140,250 120,250" stroke="#60a5fa" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <path d="M240,200 Q260,250 280,250" stroke="#60a5fa" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <!-- Western Power label -->
  <rect x="100" y="310" width="200" height="30" rx="4" fill="#0f2540" stroke="#3b82f6" stroke-width="1"/>
  <text x="200" y="329" text-anchor="middle" fill="#93c5fd" font-size="11" font-family="system-ui">Western Power: 2.3M people</text>
  <!-- Sector icons -->
  <g fill="#1e3a5f" stroke="#4a9edd" stroke-width="1.5">
    <rect x="340" y="160" width="50" height="60" rx="3"/>
    <text x="365" y="200" text-anchor="middle" fill="#60a5fa" font-size="9">ENERGY</text>
    <rect x="410" y="175" width="50" height="45" rx="3"/>
    <text x="435" y="205" text-anchor="middle" fill="#60a5fa" font-size="9">HEALTH</text>
    <rect x="80" y="175" width="50" height="45" rx="3"/>
    <text x="105" y="200" text-anchor="middle" fill="#60a5fa" font-size="9">TELECOM</text>
  </g>
  <!-- NIST classification -->
  <rect x="80" y="360" width="100" height="52" rx="4" fill="#1e0a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="130" y="382" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="700">TOP</text>
  <text x="130" y="396" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="700">SECRET</text>
  <text x="130" y="408" text-anchor="middle" fill="#ef4444" font-size="8">PSPF</text>
  <rect x="200" y="360" width="100" height="52" rx="4" fill="#1a1000" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="250" y="382" text-anchor="middle" fill="#fde68a" font-size="10" font-weight="700">SECRET</text>
  <text x="250" y="400" text-anchor="middle" fill="#f59e0b" font-size="8">PSPF</text>
  <rect x="320" y="360" width="100" height="52" rx="4" fill="#0a1a0a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="370" y="382" text-anchor="middle" fill="#86efac" font-size="10" font-weight="700">PROT-</text>
  <text x="370" y="396" text-anchor="middle" fill="#86efac" font-size="10" font-weight="700">ECTED</text>
  <text x="370" y="408" text-anchor="middle" fill="#22c55e" font-size="8">PSPF</text>
  <!-- MarcoWeb watermark -->
  <text x="30" y="40" fill="#4a9edd" font-size="14" font-weight="700" font-family="system-ui, sans-serif" opacity="0.9">MarcoWeb.org</text>
  <!-- Category badge -->
  <rect x="1020" y="22" width="160" height="28" rx="14" fill="#0c2340" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="1100" y="41" text-anchor="middle" fill="#7dd3fc" font-size="12" font-weight="600">INFO SECURITY</text>
  <!-- Bottom band -->
  <rect x="0" y="530" width="1200" height="100" fill="#030a14" opacity="0.97"/>
  <rect x="0" y="528" width="1200" height="3" fill="#0ea5e9"/>
  <text x="50" y="576" fill="white" font-size="27" font-weight="800" font-family="system-ui, sans-serif">The Crucial Role of Information Security</text>
  <text x="50" y="612" fill="#7dd3fc" font-size="17" font-family="system-ui, sans-serif">Critical Infrastructure · CIA Triad · PSPF · NIST</text>
</svg>
