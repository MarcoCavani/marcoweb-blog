  <line x1="215" y1="270" x2="185" y2="305" stroke="#2dd4bf" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="155" y1="340" x2="185" y2="305" stroke="#2dd4bf" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="215" y1="340" x2="185" y2="305" stroke="#2dd4bf" stroke-width="1.5" stroke-opacity="0.6"/>
