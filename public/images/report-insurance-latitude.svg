<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#170d20"/>
    </linearGradient>
    <linearGradient id="band" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="8" fill="url(#band)"/>
  <rect width="1200" height="8" y="622" fill="url(#band)"/>
  <text x="60" y="60" fill="#c084fc" font-size="13" font-weight="600" letter-spacing="4">DIGITAL INCIDENT REPORT · FINANCIAL SERVICES SECTOR</text>
  <line x1="60" y1="70" x2="1140" y2="70" stroke="#c084fc" stroke-opacity="0.3" stroke-width="1"/>
  <text x="60" y="145" fill="#ffffff" font-size="44" font-weight="800" letter-spacing="-1">Latitude Financial</text>
  <text x="60" y="200" fill="#e9d5ff" font-size="24" font-weight="400">14 Million Records · Largest Australian Data Breach</text>
  <rect x="60" y="225" width="50" height="4" fill="#c084fc" rx="2"/>
  <text x="820" y="305" fill="#cbd5e1" font-size="16" opacity="0.85"/>
  <text x="60" y="280" fill="#cbd5e1" font-size="16" opacity="0.85">Attackers used stolen employee credentials to access service</text>
  <text x="60" y="305" fill="#cbd5e1" font-size="16" opacity="0.85">providers, ultimately stealing 14M records including govt IDs.</text>
  <rect x="60" y="345" width="200" height="100" fill="#2e1065" rx="6"/>
  <text x="160" y="382" fill="#c084fc" font-size="28" font-weight="800" text-anchor="middle">14M</text>
  <text x="160" y="405" fill="#e9d5ff" font-size="12" text-anchor="middle">RECORDS STOLEN</text>
  <rect x="280" y="345" width="200" height="100" fill="#2e1065" rx="6"/>
  <text x="380" y="385" fill="#c084fc" font-size="24" font-weight="800" text-anchor="middle">Mar 2023</text>
  <text x="380" y="408" fill="#e9d5ff" font-size="12" text-anchor="middle">BREACH DATE</text>
  <rect x="500" y="345" width="200" height="100" fill="#2e1065" rx="6"/>
  <text x="600" y="382" fill="#ef4444" font-size="18" font-weight="800" text-anchor="middle">7.9M IDs</text>
  <text x="600" y="402" fill="#fca5a5" font-size="11" text-anchor="middle">GOVT DOCUMENT NUMBERS</text>
  <rect x="800" y="95" width="340" height="430" fill="#111827" rx="8"/>
  <text x="970" y="130" fill="#c084fc" font-size="11" text-anchor="middle" letter-spacing="3">ITGC CONTROLS IMPLICATED</text>
  <line x1="820" y1="140" x2="1120" y2="140" stroke="#c084fc" stroke-opacity="0.2" stroke-width="1"/>
  <text x="820" y="170" fill="#e2e8f0" font-size="13">Third-Party Access Management</text>
  <text x="820" y="192" fill="#e2e8f0" font-size="13">Multi-Factor Authentication</text>
  <text x="820" y="214" fill="#e2e8f0" font-size="13">Data Retention Minimisation</text>
  <text x="820" y="236" fill="#e2e8f0" font-size="13">Vendor Security Assessment</text>
  <text x="820" y="258" fill="#e2e8f0" font-size="13">Credential Protection Controls</text>
  <line x1="820" y1="275" x2="1120" y2="275" stroke="#c084fc" stroke-opacity="0.2" stroke-width="1"/>
  <text x="970" y="305" fill="#c084fc" font-size="11" text-anchor="middle" letter-spacing="3">SECTOR CONTEXT</text>
  <text x="820" y="335" fill="#94a3b8" font-size="12">Consumer finance firms retain ID docs</text>
  <text x="820" y="355" fill="#94a3b8" font-size="12">for credit decisioning years after</text>
  <text x="820" y="375" fill="#94a3b8" font-size="12">account closure. Data retention periods</text>
  <text x="820" y="395" fill="#94a3b8" font-size="12">expand the breach population.</text>
  <text x="970" y="480" fill="#c084fc" font-size="11" text-anchor="middle" letter-spacing="2">marcoweb.org</text>
</svg>
