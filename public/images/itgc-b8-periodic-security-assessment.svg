<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#051a1a"/>
      <stop offset="100%" stop-color="#0d3d3d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <!-- Pentester/assessment icon: magnifier over system -->
  <circle cx="175" cy="295" r="80" fill="none" stroke="#14b8a6" stroke-width="2" stroke-opacity="0.5"/>
  <circle cx="175" cy="295" r="55" fill="none" stroke="#14b8a6" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- system representation inside -->
  <rect x="148" y="268" width="54" height="40" fill="none" stroke="#2dd4bf" stroke-width="1.5" rx="3" stroke-opacity="0.8"/>
  <line x1="155" y1="280" x2="195" y2="280" stroke="#2dd4bf" stroke-opacity="0.5" stroke-width="1"/>
  <line x1="155" y1="290" x2="195" y2="290" stroke="#2dd4bf" stroke-opacity="0.5" stroke-width="1"/>
  <line x1="155" y1="300" x2="180" y2="300" stroke="#2dd4bf" stroke-opacity="0.5" stroke-width="1"/>
  <!-- Vulnerability dot -->
  <circle cx="192" cy="272" r="6" fill="#ef4444" opacity="0.9"/>
  <text x="192" y="275" fill="#ffffff" font-size="8" text-anchor="middle">!</text>
  <!-- Magnifier handle -->
  <line x1="235" y1="350" x2="270" y2="390" stroke="#14b8a6" stroke-width="4" stroke-linecap="round"/>
  <text x="310" y="180" fill="#2dd4bf" font-size="13" font-weight="600" letter-spacing="4" opacity="0.9">GROUP B · CONTROL B.8</text>
  <text x="310" y="253" fill="#ffffff" font-size="40" font-weight="800" letter-spacing="-1">Periodic Security</text>
  <text x="310" y="300" fill="#ffffff" font-size="40" font-weight="800" letter-spacing="-1">Assessment</text>
  <text x="310" y="345" fill="#99f6e4" font-size="21" font-weight="400" opacity="0.85">Penetration Testing, Control Assessments and Red Team</text>
  <rect x="310" y="365" width="60" height="4" fill="url(#accent)" rx="2"/>
  <text x="310" y="410" fill="#2dd4bf" font-size="15" font-weight="500" letter-spacing="2" opacity="0.8">IT GENERAL CONTROLS · IT AUDIT</text>
  <text x="310" y="500" fill="#ffffff" font-size="16" opacity="0.5" letter-spacing="1">marcoweb.org</text>
</svg>
