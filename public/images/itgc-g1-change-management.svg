<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0f00"/>
      <stop offset="100%" stop-color="#5c3200"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <!-- Change management pipeline stages -->
  <rect x="80" y="215" width="280" height="190" fill="none" stroke="#f59e0b" stroke-width="1.5" rx="6" stroke-opacity="0.6"/>
  <text x="220" y="235" fill="#fbbf24" font-size="11" text-anchor="middle">CHANGE PIPELINE</text>
  <line x1="80" y1="245" x2="360" y2="245" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
  <!-- Pipeline stages -->
  <rect x="100" y="258" width="55" height="28" fill="#22c55e" fill-opacity="0.2" rx="4"/>
  <text x="127" y="276" fill="#86efac" font-size="9" text-anchor="middle" font-weight="600">REQUEST</text>
  <text x="165" y="275" fill="#f59e0b" font-size="14">→</text>
  <rect x="175" y="258" width="55" height="28" fill="#22c55e" fill-opacity="0.2" rx="4"/>
  <text x="202" y="276" fill="#86efac" font-size="9" text-anchor="middle" font-weight="600">REVIEW</text>
  <text x="240" y="275" fill="#f59e0b" font-size="14">→</text>
  <rect x="250" y="258" width="55" height="28" fill="#22c55e" fill-opacity="0.2" rx="4"/>
  <text x="277" y="276" fill="#86efac" font-size="9" text-anchor="middle" font-weight="600">APPROVE</text>
  <!-- Break in pipeline with SMARS red -->
  <rect x="100" y="304" width="55" height="28" fill="#22c55e" fill-opacity="0.2" rx="4"/>
  <text x="127" y="322" fill="#86efac" font-size="9" text-anchor="middle">TEST</text>
  <text x="165" y="321" fill="#f59e0b" font-size="14">→</text>
  <rect x="175" y="304" width="55" height="28" fill="#ef4444" fill-opacity="0.3" rx="4"/>
  <text x="202" y="318" fill="#fca5a5" font-size="8" text-anchor="middle" font-weight="600">DEPLOY</text>
  <text x="202" y="328" fill="#fca5a5" font-size="7" text-anchor="middle">INCOMPLETE</text>
  <line x1="237" y1="318" x2="310" y2="318" stroke="#ef4444" stroke-width="2" stroke-dasharray="4"/>
  <text x="100" y="365" fill="#f59e0b" font-size="10" font-weight="600">DEPLOYMENT GAP → $440M LOSS</text>
  <text x="310" y="180" fill="#fbbf24" font-size="13" font-weight="600" letter-spacing="4" opacity="0.9">GROUP G · CHANGE MANAGEMENT CONTROLS</text>
  <text x="310" y="265" fill="#ffffff" font-size="46" font-weight="800" letter-spacing="-1">Change Management</text>
  <text x="310" y="320" fill="#fde68a" font-size="20" font-weight="400" opacity="0.85">IT Change Governance, Approval and Deployment Controls</text>
  <rect x="310" y="352" width="60" height="4" fill="url(#accent)" rx="2"/>
  <text x="310" y="403" fill="#fbbf24" font-size="15" font-weight="500" letter-spacing="2" opacity="0.8">IT GENERAL CONTROLS · IT AUDIT</text>
  <text x="310" y="500" fill="#ffffff" font-size="16" opacity="0.5" letter-spacing="1">marcoweb.org</text>
