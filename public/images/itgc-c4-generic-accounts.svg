<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0a1e"/>
      <stop offset="100%" stop-color="#2d1b5e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <!-- Multiple users sharing one key -->
  <circle cx="130" cy="255" r="22" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="130" y="261" fill="#a78bfa" font-size="18" text-anchor="middle">A</text>
  <circle cx="185" cy="255" r="22" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="185" y="261" fill="#a78bfa" font-size="18" text-anchor="middle">B</text>
  <circle cx="240" cy="255" r="22" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="240" y="261" fill="#a78bfa" font-size="18" text-anchor="middle">C</text>
  <!-- Lines converging to one key -->
  <line x1="130" y1="277" x2="185" y2="310" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="185" y1="277" x2="185" y2="310" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="240" y1="277" x2="185" y2="310" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Single key -->
  <circle cx="185" cy="330" r="18" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
  <rect x="197" y="327" width="28" height="10" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <rect x="217" y="333" width="8" height="8" fill="#f59e0b" fill-opacity="0.5"/>
  <text x="185" y="380" fill="#fbbf24" font-size="10" text-anchor="middle">SHARED ACCOUNT</text>
  <text x="185" y="393" fill="#f59e0b" font-size="9" text-anchor="middle" opacity="0.7">No individual accountability</text>
  <text x="310" y="180" fill="#a78bfa" font-size="13" font-weight="600" letter-spacing="4" opacity="0.9">GROUP C · CONTROL C.4</text>
  <text x="310" y="265" fill="#ffffff" font-size="52" font-weight="800" letter-spacing="-1">Generic Accounts</text>
  <text x="310" y="320" fill="#c4b5fd" font-size="22" font-weight="400" opacity="0.85">Shared Credentials, Service Accounts and Ownership</text>
  <rect x="310" y="355" width="60" height="4" fill="url(#accent)" rx="2"/>
  <text x="310" y="410" fill="#a78bfa" font-size="15" font-weight="500" letter-spacing="2" opacity="0.8">IT GENERAL CONTROLS · IT AUDIT</text>
  <text x="310" y="500" fill="#ffffff" font-size="16" opacity="0.5" letter-spacing="1">marcoweb.org</text>
</svg>
