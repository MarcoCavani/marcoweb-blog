<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0505"/>
      <stop offset="100%" stop-color="#4a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <!-- Equipment lifecycle panel -->
  <rect x="80" y="215" width="280" height="190" fill="none" stroke="#ef4444" stroke-width="1.5" rx="6" stroke-opacity="0.6"/>
  <text x="220" y="235" fill="#f87171" font-size="11" text-anchor="middle">EQUIPMENT DISPOSAL REGISTER</text>
  <line x1="80" y1="245" x2="360" y2="245" stroke="#ef4444" stroke-opacity="0.3" stroke-width="1"/>
  <!-- Disposal entries -->
  <text x="95" y="264" fill="#fca5a5" font-size="9">ASSET</text>
  <text x="200" y="264" fill="#fca5a5" font-size="9">DATA WIPE</text>
  <text x="300" y="264" fill="#fca5a5" font-size="9">STATUS</text>
  <line x1="90" y1="269" x2="355" y2="269" stroke="#ef4444" stroke-opacity="0.2" stroke-width="1"/>
  <text x="95" y="284" fill="#e2e8f0" font-size="9">SRV-LEGACY-01</text>
  <text x="200" y="284" fill="#86efac" font-size="9">CERTIFIED</text>
  <text x="300" y="284" fill="#86efac" font-size="9">OK</text>
  <text x="95" y="300" fill="#e2e8f0" font-size="9">LPT-HR-042</text>
  <text x="200" y="300" fill="#fca5a5" font-size="9">NOT WIPED</text>
  <text x="300" y="300" fill="#ef4444" font-size="9">SOLD!</text>
  <text x="95" y="316" fill="#e2e8f0" font-size="9">HDD-FIN-012</text>
  <text x="200" y="316" fill="#fca5a5" font-size="9">MISSING</text>
  <text x="300" y="316" fill="#ef4444" font-size="9">UNKNOWN</text>
  <text x="95" y="332" fill="#e2e8f0" font-size="9">LPT-EXEC-007</text>
  <text x="200" y="332" fill="#fca5a5" font-size="9">NOT WIPED</text>
  <text x="300" y="332" fill="#f59e0b" font-size="9">DONATED</text>
  <!-- Alert -->
  <rect x="95" y="350" width="240" height="22" fill="#ef4444" fill-opacity="0.2" rx="3"/>
  <text x="215" y="365" fill="#fca5a5" font-size="10" text-anchor="middle" font-weight="600">74,000 RECORDS ON UNSANITISED LAPTOP</text>
  <text x="310" y="180" fill="#f87171" font-size="13" font-weight="600" letter-spacing="4" opacity="0.9">GROUP I · PHYSICAL SECURITY CONTROLS</text>
  <text x="310" y="265" fill="#ffffff" font-size="46" font-weight="800" letter-spacing="-1">Physical Equipment</text>
  <text x="310" y="320" fill="#fecaca" font-size="20" font-weight="400" opacity="0.85">Asset Inventory, Disposal and Sanitisation Controls</text>
  <rect x="310" y="352" width="60" height="4" fill="url(#accent)" rx="2"/>
  <text x="310" y="403" fill="#f87171" font-size="15" font-weight="500" letter-spacing="2" opacity="0.8">IT GENERAL CONTROLS · IT AUDIT</text>
  <text x="310" y="500" fill="#ffffff" font-size="16" opacity="0.5" letter-spacing="1">marcoweb.org</text>
