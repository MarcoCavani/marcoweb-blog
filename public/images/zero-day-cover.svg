<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08111e"/>
      <stop offset="100%" style="stop-color:#1a0a24"/>
    </linearGradient>
    <radialGradient id="glow" cx="60%" cy="45%" r="40%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#08111e;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Grid -->
  <g stroke="#2d1b4e" stroke-width="1" opacity="0.4">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
  </g>
  <!-- Big 0-DAY text watermark -->
  <text x="580" y="350" text-anchor="middle" fill="#7c3aed" font-size="220" font-weight="900" font-family="monospace" opacity="0.07">0</text>
  <!-- Clock/timer circle -->
  <circle cx="780" cy="255" r="130" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.6"/>
  <circle cx="780" cy="255" r="115" fill="#120820" stroke="#5b21b6" stroke-width="1.5" opacity="0.8"/>
  <!-- Clock face -->
  <line x1="780" y1="255" x2="780" y2="165" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>
  <line x1="780" y1="255" x2="850" y2="290" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
  <circle cx="780" cy="255" r="6" fill="#a78bfa"/>
  <!-- Clock ticks -->
  <g stroke="#5b21b6" stroke-width="2">
    <line x1="780" y1="142" x2="780" y2="152"/>
    <line x1="893" y1="255" x2="883" y2="255"/>
    <line x1="780" y1="368" x2="780" y2="358"/>
    <line x1="667" y1="255" x2="677" y2="255"/>
  </g>
  <!-- "ZERO-DAY" label on clock -->
  <text x="780" y="295" text-anchor="middle" fill="#c4b5fd" font-size="14" font-weight="700" font-family="monospace">ZERO-DAY</text>
  <text x="780" y="315" text-anchor="middle" fill="#7c3aed" font-size="11" font-family="monospace">WINDOW</text>
  <!-- Vendor pie segments (simplified) -->
  <text x="80" y="80" fill="#a78bfa" font-size="13" font-weight="600" font-family="system-ui">VULNERABILITIES BY VENDOR (2006–2023)</text>
  <!-- Microsoft bar -->
  <rect x="80" y="100" width="280" height="28" rx="4" fill="#7c3aed" opacity="0.8"/>
  <text x="90" y="118" fill="white" font-size="12" font-weight="600">Microsoft</text>
  <text x="370" y="118" fill="#c4b5fd" font-size="12" text-anchor="end">39.72%</text>
  <!-- Adobe bar -->
  <rect x="80" y="140" width="79" height="28" rx="4" fill="#5b21b6" opacity="0.8"/>
  <text x="90" y="158" fill="white" font-size="12">Adobe</text>
  <text x="370" y="158" fill="#a78bfa" font-size="12" text-anchor="end">11.3%</text>
  <!-- Apple bar -->
  <rect x="80" y="180" width="47" height="28" rx="4" fill="#4c1d95" opacity="0.8"/>
  <text x="90" y="198" fill="white" font-size="12">Apple</text>
  <text x="370" y="198" fill="#a78bfa" font-size="12" text-anchor="end">6.75%</text>
  <!-- Google bar -->
  <rect x="80" y="220" width="46" height="28" rx="4" fill="#4c1d95" opacity="0.8"/>
  <text x="90" y="238" fill="white" font-size="12">Google</text>
  <text x="370" y="238" fill="#a78bfa" font-size="12" text-anchor="end">6.59%</text>
  <!-- Others bar -->
  <rect x="80" y="260" width="90" height="28" rx="4" fill="#3b0764" opacity="0.8"/>
  <text x="90" y="278" fill="#c4b5fd" font-size="12">Others</text>
  <text x="370" y="278" fill="#a78bfa" font-size="12" text-anchor="end">35.6%</text>
  <!-- Exploit code snippet -->
  <rect x="80" y="330" width="360" height="120" rx="6" fill="#0d0618" stroke="#5b21b6" stroke-width="1.5" opacity="0.9"/>
  <text x="100" y="358" fill="#6b7280" font-size="11" font-family="monospace">// CVE-2023-XXXX Exploit</text>
  <text x="100" y="378" fill="#a78bfa" font-size="11" font-family="monospace">if <tspan fill="#ef4444">(kernel.version</tspan> <tspan fill="white">&lt;</tspan> <tspan fill="#fbbf24">"5.15"</tspan><tspan fill="#ef4444">)</tspan> <tspan fill="white">&#123;</tspan></text>
  <text x="100" y="398" fill="#60a5fa" font-size="11" font-family="monospace">  escalate_privileges<tspan fill="white">();</tspan></text>
  <text x="100" y="418" fill="#ef4444" font-size="11" font-family="monospace">  exec_arbitrary_code<tspan fill="white">();</tspan></text>
  <text x="100" y="438" fill="white" font-size="11" font-family="monospace">&#125;</text>
  <!-- DIGITAL REPORT badge -->
  <rect x="1030" y="22" width="150" height="28" rx="14" fill="#4c1d95" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="1105" y="41" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">THREAT ANALYSIS</text>
  <!-- MarcoWeb watermark -->
  <text x="30" y="40" fill="#7c3aed" font-size="14" font-weight="700" font-family="system-ui, sans-serif" opacity="0.9">MarcoWeb.org</text>
  <!-- Bottom title band -->
  <rect x="0" y="530" width="1200" height="100" fill="#050210" opacity="0.97"/>
  <rect x="0" y="528" width="1200" height="3" fill="#7c3aed"/>
  <text x="50" y="578" fill="white" font-size="30" font-weight="800" font-family="system-ui, sans-serif">Exploring Zero-Day Vulnerabilities</text>
  <text x="50" y="612" fill="#a78bfa" font-size="18" font-family="system-ui, sans-serif">Vendor Analysis 2006–2023</text>
</svg>
