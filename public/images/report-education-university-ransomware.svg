  <text x="820" y="170" fill="#e2e8f0" font-size="13">Endpoint Detection and Response</text>
  <text x="820" y="192" fill="#e2e8f0" font-size="13">Network Segmentation (Research/Admin)</text>
  <text x="820" y="214" fill="#e2e8f0" font-size="13">Vulnerability and Patch Management</text>
  <text x="820" y="236" fill="#e2e8f0" font-size="13">Backup Isolation and Recovery</text>
  <text x="820" y="258" fill="#e2e8f0" font-size="13">Identity and Access Governance</text>
  <line x1="820" y1="275" x2="1120" y2="275" stroke="#f43f5e" stroke-opacity="0.2" stroke-width="1"/>
  <text x="970" y="305" fill="#f43f5e" font-size="11" text-anchor="middle" letter-spacing="3">SECTOR CONTEXT</text>
  <text x="820" y="335" fill="#94a3b8" font-size="12">Universities balance open academic</text>
  <text x="820" y="355" fill="#94a3b8" font-size="12">networks with security obligations for</text>
  <text x="820" y="375" fill="#94a3b8" font-size="12">research data, student records, and</text>
  <text x="820" y="395" fill="#94a3b8" font-size="12">grant-funded IP.</text>
  <text x="970" y="480" fill="#f43f5e" font-size="11" text-anchor="middle" letter-spacing="2">marcoweb.org</text>
