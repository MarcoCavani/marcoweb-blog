  <text x="60" y="280" fill="#cbd5e1" font-size="16" opacity="0.85">Universities face a structural ransomware vulnerability: open</text>
  <text x="60" y="305" fill="#cbd5e1" font-size="16" opacity="0.85">networks, legacy systems, and research data under deadline.</text>
  <rect x="60" y="345" width="200" height="100" fill="#3b0010" rx="6"/>
