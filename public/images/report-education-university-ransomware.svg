  <rect x="800" y="95" width="340" height="430" fill="#111827" rx="8"/>
  <text x="970" y="130" fill="#f43f5e" font-size="11" text-anchor="middle" letter-spacing="3">ITGC CONTROLS IMPLICATED</text>
