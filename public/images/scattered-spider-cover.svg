<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08111e"/>
      <stop offset="100%" stop-color="#150808"/>
    </linearGradient>
    <radialGradient id="web-glow" cx="680" cy="280" r="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff2222" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ff2222" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-red" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-red-sm" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-orange" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="text-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid overlay (red-tinted) -->
  <g stroke="#dd4444" stroke-width="0.5" opacity="0.05">
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- Horizontal accent glow lines -->
  <line x1="0" y1="190" x2="1200" y2="190" stroke="#ff3333" stroke-width="1" opacity="0.12"/>
  <line x1="0" y1="358" x2="1200" y2="358" stroke="#ff3333" stroke-width="1" opacity="0.08"/>

  <!-- Scattered background dots (texture) -->
  <g fill="#993333" opacity="0.18">
    <circle cx="50" cy="100" r="3"/>
    <circle cx="350" cy="68" r="2"/>
    <circle cx="420" cy="490" r="3"/>
    <circle cx="95" cy="450" r="2"/>
    <circle cx="300" cy="505" r="2"/>
    <circle cx="80" cy="355" r="3"/>
    <circle cx="1100" cy="410" r="3"/>
    <circle cx="975" cy="482" r="2"/>
    <circle cx="1162" cy="305" r="2"/>
    <circle cx="430" cy="140" r="2"/>
    <circle cx="1050" cy="310" r="2"/>
  </g>

  <!-- === WEB GLOW === -->
  <circle cx="680" cy="280" r="260" fill="url(#web-glow)"/>

  <!-- === SPIDER WEB (centre: 680, 280) === -->
  <!-- Spokes — 8 radial lines -->
  <g stroke="#cc2222" stroke-width="1.8" opacity="0.9">
    <line x1="680" y1="280" x2="900" y2="280"/>
    <line x1="680" y1="280" x2="836" y2="436"/>
    <line x1="680" y1="280" x2="680" y2="500"/>
    <line x1="680" y1="280" x2="524" y2="436"/>
    <line x1="680" y1="280" x2="460" y2="280"/>
    <line x1="680" y1="280" x2="524" y2="124"/>
    <line x1="680" y1="280" x2="680" y2="60"/>
    <line x1="680" y1="280" x2="836" y2="124"/>
  </g>

  <!-- Ring 1 (r=44) -->
  <polygon points="724,280 711,311 680,324 649,311 636,280 649,249 680,236 711,249"
    fill="none" stroke="#cc2222" stroke-width="1.7" opacity="0.92"/>
  <!-- Ring 2 (r=88) -->
  <polygon points="768,280 742,342 680,368 618,342 592,280 618,218 680,192 742,218"
    fill="none" stroke="#cc2222" stroke-width="1.4" opacity="0.85"/>
  <!-- Ring 3 (r=132) -->
  <polygon points="812,280 773,373 680,412 587,373 548,280 587,187 680,148 773,187"
    fill="none" stroke="#cc2222" stroke-width="1.2" opacity="0.75"/>
  <!-- Ring 4 (r=176) -->
  <polygon points="856,280 804,404 680,456 556,404 504,280 556,156 680,104 804,156"
    fill="none" stroke="#cc2222" stroke-width="1.0" opacity="0.62"/>
  <!-- Ring 5 (r=220) -->
  <polygon points="900,280 836,436 680,500 524,436 460,280 524,124 680,60 836,124"
    fill="none" stroke="#cc2222" stroke-width="0.8" opacity="0.50"/>

  <!-- Node dots at ring-1 intersections -->
  <g fill="#ff3333" opacity="0.85">
    <circle cx="724" cy="280" r="3.5"/>
    <circle cx="711" cy="311" r="3.5"/>
    <circle cx="680" cy="324" r="3.5"/>
    <circle cx="649" cy="311" r="3.5"/>
    <circle cx="636" cy="280" r="3.5"/>
    <circle cx="649" cy="249" r="3.5"/>
    <circle cx="680" cy="236" r="3.5"/>
    <circle cx="711" cy="249" r="3.5"/>
  </g>
  <!-- Node dots at ring-2 intersections (smaller) -->
  <g fill="#ff3333" opacity="0.55">
    <circle cx="768" cy="280" r="2.5"/>
    <circle cx="742" cy="342" r="2.5"/>
    <circle cx="680" cy="368" r="2.5"/>
    <circle cx="618" cy="342" r="2.5"/>
    <circle cx="592" cy="280" r="2.5"/>
    <circle cx="618" cy="218" r="2.5"/>
    <circle cx="680" cy="192" r="2.5"/>
    <circle cx="742" cy="218" r="2.5"/>
  </g>

  <!-- === SPIDER (centre of web) === -->
  <!-- Legs — right side -->
  <g stroke="#aa0000" stroke-width="2.6" stroke-linecap="round" fill="none">
    <polyline points="692,261 718,240 742,248"/>
    <polyline points="694,269 722,258 748,259"/>
    <polyline points="695,278 723,276 750,272"/>
    <polyline points="694,288 721,294 748,288"/>
  </g>
  <!-- Legs — left side -->
  <g stroke="#aa0000" stroke-width="2.6" stroke-linecap="round" fill="none">
    <polyline points="668,261 642,240 618,248"/>
    <polyline points="666,269 638,258 612,259"/>
    <polyline points="665,278 637,276 610,272"/>
    <polyline points="666,288 639,294 612,288"/>
  </g>
  <!-- Abdomen (larger lower body) -->
  <ellipse cx="680" cy="290" rx="18" ry="24" fill="#990000" filter="url(#glow-red-sm)"/>
  <!-- Cephalothorax (head) -->
  <ellipse cx="680" cy="261" rx="13" ry="12" fill="#880000"/>
  <!-- Highlight on abdomen -->
  <ellipse cx="676" cy="283" rx="7" ry="9" fill="#cc2222" opacity="0.45"/>
  <!-- Eyes -->
  <circle cx="675" cy="258" r="3.5" fill="#ff6600" opacity="0.95" filter="url(#glow-orange)"/>
  <circle cx="685" cy="258" r="3.5" fill="#ff6600" opacity="0.95" filter="url(#glow-orange)"/>

  <!-- === CROSSHAIR / TARGET (left, centre: 185, 280) === -->
  <!-- Outer glow ring -->
  <circle cx="185" cy="280" r="95" fill="none" stroke="#ff3333" stroke-width="1.5" opacity="0.65" filter="url(#glow-red-sm)"/>
  <!-- Inner ring -->
  <circle cx="185" cy="280" r="52" fill="none" stroke="#ff3333" stroke-width="1.2" opacity="0.8"/>
  <!-- Crosshair lines (with gap at inner circle) -->
  <g stroke="#ff3333" stroke-width="1.5" opacity="0.8">
    <line x1="58"  y1="280" x2="133" y2="280"/>
    <line x1="237" y1="280" x2="312" y2="280"/>
    <line x1="185" y1="153" x2="185" y2="228"/>
    <line x1="185" y1="332" x2="185" y2="407"/>
  </g>
  <!-- Inner tick marks -->
  <g stroke="#ff3333" stroke-width="1.5" opacity="0.7">
    <line x1="185" y1="238" x2="185" y2="250"/>
    <line x1="185" y1="310" x2="185" y2="322"/>
    <line x1="143" y1="280" x2="155" y2="280"/>
    <line x1="215" y1="280" x2="227" y2="280"/>
  </g>
  <!-- Centre dot -->
  <circle cx="185" cy="280" r="14" fill="#ff3333" opacity="0.55" filter="url(#glow-red)"/>
  <circle cx="185" cy="280" r="6"  fill="#ff4444" opacity="0.95"/>
  <!-- Label -->
  <text x="185" y="422" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" fill="#ff3333" text-anchor="middle" letter-spacing="2.5" opacity="0.85">THREAT ACTOR</text>
  <text x="185" y="436" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#888888" text-anchor="middle" letter-spacing="1" opacity="0.75">UNC3944 | SCATTERED SPIDER</text>

  <!-- === CONNECTION LINE (crosshair → web outer edge) === -->
  <line x1="280" y1="280" x2="458" y2="280" stroke="#ff3333" stroke-width="1.5" stroke-dasharray="8,5" opacity="0.38"/>
  <!-- Arrow tip pointing into web -->
  <polygon points="458,273 474,280 458,287" fill="#ff3333" opacity="0.38"/>

  <!-- === NETWORK NODES top-right (scattered group attribution) === -->
  <g fill="#cc2222" opacity="0.28">
    <circle cx="962" cy="72"  r="5"/>
    <circle cx="1002" cy="48" r="4"/>
    <circle cx="1042" cy="82" r="6"/>
    <circle cx="1078" cy="52" r="4"/>
    <circle cx="1112" cy="78" r="5"/>
    <circle cx="1152" cy="58" r="4"/>
    <circle cx="1082" cy="112" r="3"/>
    <circle cx="1132" cy="108" r="4"/>
    <circle cx="1022" cy="118" r="3"/>
  </g>
  <g stroke="#cc2222" stroke-width="0.8" opacity="0.18">
    <line x1="962"  y1="72"  x2="1002" y2="48"/>
    <line x1="1002" y1="48"  x2="1042" y2="82"/>
    <line x1="1042" y1="82"  x2="1078" y2="52"/>
    <line x1="1078" y1="52"  x2="1112" y2="78"/>
    <line x1="1112" y1="78"  x2="1152" y2="58"/>
    <line x1="1042" y1="82"  x2="1082" y2="112"/>
    <line x1="1082" y1="112" x2="1132" y2="108"/>
    <line x1="1022" y1="118" x2="1082" y2="112"/>
    <line x1="1002" y1="48"  x2="1078" y2="52"/>
  </g>

  <!-- === BOTTOM TEXT BAND === -->
  <rect x="0" y="530" width="1200" height="100" fill="#000" opacity="0.6"/>

  <!-- DIGITAL REPORT badge (red) — top right -->
  <rect x="980" y="26" rx="5" width="182" height="32" fill="#cc2222" opacity="0.92"/>
  <text x="1071" y="48" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="900" fill="white" text-anchor="middle" letter-spacing="1.5">DIGITAL REPORT</text>

  <!-- MarcoWeb.org — top left -->
  <circle cx="54" cy="52" r="28" fill="none" stroke="#4a9edd" stroke-width="2" opacity="0.85"/>
  <text x="54" y="58" font-family="'Arial Black', Arial, sans-serif" font-size="20" font-weight="900" fill="white" text-anchor="middle" opacity="0.9">M</text>
  <text x="92" y="56" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="white" opacity="0.8">Marcoweb.org</text>

  <!-- Main title -->
  <text x="600" y="576" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-0.5" filter="url(#text-shadow)">SCATTERED SPIDER: THE CASINO HACKS</text>
  <text x="600" y="614" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="400" fill="#ff8888" text-anchor="middle" letter-spacing="2">Threat Intelligence Report — September 2024</text>
</svg>
