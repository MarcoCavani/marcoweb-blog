<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a2640"/>
    </linearGradient>
    <linearGradient id="band" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="8" fill="url(#band)"/>
  <rect width="1200" height="8" y="622" fill="url(#band)"/>
  <!-- Report label -->
  <text x="60" y="60" fill="#3b82f6" font-size="13" font-weight="600" letter-spacing="4">DIGITAL INCIDENT REPORT · FINTECH SECTOR</text>
  <line x1="60" y1="70" x2="1140" y2="70" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1"/>
  <!-- Main content -->
  <text x="60" y="145" fill="#ffffff" font-size="56" font-weight="800" letter-spacing="-1">Revolut</text>
  <text x="60" y="200" fill="#93c5fd" font-size="24" font-weight="400">2022 Customer Data Breach</text>
  <rect x="60" y="225" width="50" height="4" fill="#3b82f6" rx="2"/>
  <text x="60" y="280" fill="#cbd5e1" font-size="16" opacity="0.85">Social engineering attack targeted a third-party database</text>
  <text x="60" y="305" fill="#cbd5e1" font-size="16" opacity="0.85">provider, exposing 50,150 customer records.</text>
  <!-- Stat boxes -->
  <rect x="60" y="345" width="200" height="100" fill="#1e3a5f" rx="6"/>
  <text x="160" y="390" fill="#3b82f6" font-size="36" font-weight="800" text-anchor="middle">50K</text>
  <text x="160" y="415" fill="#93c5fd" font-size="12" text-anchor="middle">CUSTOMERS EXPOSED</text>
  <rect x="280" y="345" width="200" height="100" fill="#1e3a5f" rx="6"/>
  <text x="380" y="385" fill="#3b82f6" font-size="24" font-weight="800" text-anchor="middle">Sep 2022</text>
  <text x="380" y="410" fill="#93c5fd" font-size="12" text-anchor="middle">INCIDENT DATE</text>
  <rect x="500" y="345" width="200" height="100" fill="#1e3a5f" rx="6"/>
  <text x="600" y="385" fill="#ef4444" font-size="22" font-weight="800" text-anchor="middle">Partial Names</text>
  <text x="600" y="408" fill="#fca5a5" font-size="11" text-anchor="middle">EMAIL · PHONE · LAST4</text>
  <!-- Right panel -->
  <rect x="800" y="95" width="340" height="430" fill="#111827" rx="8"/>
  <text x="970" y="130" fill="#3b82f6" font-size="11" text-anchor="middle" letter-spacing="3">ITGC CONTROLS IMPLICATED</text>
  <line x1="820" y1="140" x2="1120" y2="140" stroke="#3b82f6" stroke-opacity="0.2" stroke-width="1"/>
  <text x="820" y="170" fill="#e2e8f0" font-size="13">Third-Party Access Management</text>
  <text x="820" y="192" fill="#e2e8f0" font-size="13">Social Engineering Awareness</text>
  <text x="820" y="214" fill="#e2e8f0" font-size="13">Data Classification Controls</text>
  <text x="820" y="236" fill="#e2e8f0" font-size="13">Vendor Security Assessment</text>
  <text x="820" y="258" fill="#e2e8f0" font-size="13">Privileged Access to Customer DB</text>
  <line x1="820" y1="275" x2="1120" y2="275" stroke="#3b82f6" stroke-opacity="0.2" stroke-width="1"/>
  <text x="970" y="305" fill="#3b82f6" font-size="11" text-anchor="middle" letter-spacing="3">SECTOR CONTEXT</text>
  <text x="820" y="335" fill="#94a3b8" font-size="12">Revolut serves 30M+ customers globally.</text>
  <text x="820" y="355" fill="#94a3b8" font-size="12">Fintech firms hold dense financial and</text>
  <text x="820" y="375" fill="#94a3b8" font-size="12">identity data, making them high-value</text>
  <text x="820" y="395" fill="#94a3b8" font-size="12">targets for social engineering attacks.</text>
  <text x="970" y="480" fill="#3b82f6" font-size="11" text-anchor="middle" letter-spacing="2">marcoweb.org</text>
</svg>
