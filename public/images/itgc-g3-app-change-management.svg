  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <!-- Application deployment gate -->
  <rect x="80" y="215" width="280" height="190" fill="none" stroke="#f59e0b" stroke-width="1.5" rx="6" stroke-opacity="0.6"/>
  <text x="220" y="235" fill="#fbbf24" font-size="11" text-anchor="middle">APPLICATION RELEASE GATE</text>
  <line x1="80" y1="245" x2="360" y2="245" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
  <!-- Rollback indicator with TSB reference -->
  <text x="95" y="266" fill="#fde68a" font-size="9">RELEASE: TSB-CORE-MIGRATION-V4</text>
  <rect x="95" y="274" width="240" height="16" fill="#22c55e" fill-opacity="0.1" rx="2"/>
  <text x="100" y="285" fill="#86efac" font-size="8">UAT COMPLETED: 2018-04-21</text>
  <rect x="95" y="294" width="240" height="16" fill="#ef4444" fill-opacity="0.2" rx="2"/>
  <text x="100" y="305" fill="#fca5a5" font-size="8">ROLLBACK PLAN: NOT TESTED</text>
  <rect x="95" y="314" width="240" height="16" fill="#ef4444" fill-opacity="0.2" rx="2"/>
  <text x="100" y="325" fill="#fca5a5" font-size="8">DATA MIGRATION TEST: PARTIAL</text>
  <rect x="95" y="334" width="240" height="16" fill="#ef4444" fill-opacity="0.2" rx="2"/>
  <text x="100" y="345" fill="#fca5a5" font-size="8">GO/NO-GO GATE: BYPASSED</text>
  <!-- Status banner -->
  <rect x="95" y="358" width="240" height="22" fill="#ef4444" fill-opacity="0.2" rx="3"/>
