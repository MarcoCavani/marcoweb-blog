<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#051a1a"/>
      <stop offset="100%" stop-color="#0d3d3d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <!-- Data leaving icon: files with arrow being blocked -->
  <rect x="80" y="250" width="90" height="110" fill="none" stroke="#14b8a6" stroke-width="2" rx="4"/>
  <line x1="95" y1="280" x2="155" y2="280" stroke="#14b8a6" stroke-opacity="0.5" stroke-width="1.5"/>
  <line x1="95" y1="300" x2="155" y2="300" stroke="#14b8a6" stroke-opacity="0.5" stroke-width="1.5"/>
  <line x1="95" y1="320" x2="135" y2="320" stroke="#14b8a6" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="125" y="266" fill="#2dd4bf" font-size="11" text-anchor="middle">DATA</text>
  <!-- Arrow -->
  <line x1="180" y1="305" x2="240" y2="305" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="240,299 252,305 240,311" fill="#ef4444"/>
  <!-- Blocking wall -->
  <rect x="255" y="270" width="12" height="70" fill="#14b8a6" rx="2"/>
  <text x="261" y="355" fill="#2dd4bf" font-size="9" text-anchor="middle">DLP</text>
  <!-- X mark -->
  <line x1="268" y1="295" x2="285" y2="315" stroke="#ef4444" stroke-width="2.5"/>
  <line x1="285" y1="295" x2="268" y2="315" stroke="#ef4444" stroke-width="2.5"/>
  <text x="310" y="180" fill="#2dd4bf" font-size="13" font-weight="600" letter-spacing="4" opacity="0.9">GROUP B · CONTROL B.4</text>
  <text x="310" y="265" fill="#ffffff" font-size="52" font-weight="800" letter-spacing="-1">Data Loss Prevention</text>
  <text x="310" y="320" fill="#99f6e4" font-size="22" font-weight="400" opacity="0.85">Monitoring, Classification and Exfiltration Controls</text>
  <rect x="310" y="355" width="60" height="4" fill="url(#accent)" rx="2"/>
  <text x="310" y="410" fill="#2dd4bf" font-size="15" font-weight="500" letter-spacing="2" opacity="0.8">IT GENERAL CONTROLS · IT AUDIT</text>
  <text x="310" y="500" fill="#ffffff" font-size="16" opacity="0.5" letter-spacing="1">marcoweb.org</text>
</svg>
